<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaGapp - Chats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="public-config.js"></script>
    <script src="global.js"></script>
    <script>
        // Backend logic initialize
        window.supa = window.supa || window.novaCreateSupabaseClient();
    </script>

    <style>
        :root { --nova-gradient: linear-gradient(90deg, #ff6a00 0%, #ee0979 100%); --selection-bg: #005c4b; }
        body { background-color: #fff; font-family: sans-serif; overflow-x: hidden; user-select: none; }
        .header { background: var(--nova-gradient); color: white; position: sticky; top: 0; z-index: 100; transition: 0.3s; }
        .header-selection { background: var(--selection-bg) !important; }
        .chat-item { display: flex; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f2f2f2; cursor: pointer; transition: 0.2s; position: relative; }
        .chat-item.selected { background: #e9edef; }
        .avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; flex-shrink: 0; font-size: 20px; overflow: hidden; background-size: cover; background-position: center; border: 1px solid #eee; }
        .full-screen-modal { position: fixed; inset: 0; background: white; z-index: 1000; display: none; flex-direction: column; }
        .step-header { background: var(--nova-gradient); color: white; padding: 16px; display: flex; align-items: center; gap: 15px; }
        
        #mainMenu, #selectionMenu { position: absolute; right: 10px; top: 50px; background: white; color: black; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: none; z-index: 200; width: 170px; }
        .menu-item { padding: 12px 16px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }
        .menu-item:last-child { border: none; }

        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: #ff6a00; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 90; cursor: pointer; }

        .group-badge { background: #ff6a00; color: white; font-size: 9px; padding: 2px 5px; border-radius: 4px; margin-left: 5px; vertical-align: middle; text-transform: uppercase; }
        .unread-badge { background: #25d366; color: white; font-size: 11px; min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-top: 5px; }

        .switch { position: relative; display: inline-block; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ff6a00; }
        input:checked + .slider:before { transform: translateX(21px); }
    </style>
</head>
<body onclick="closeAllMenus()">

    <header id="mainHeader" class="header shadow-md">
        <div id="normalNav" class="flex justify-between items-center p-4">
            <h1 class="text-2xl font-bold tracking-tight">NovaGapp</h1>
            <div class="flex gap-5 text-xl relative">
                <span onclick="event.stopPropagation(); toggleSearch()" class="cursor-pointer">🔍</span>
                <span onclick="event.stopPropagation(); toggleMenu('mainMenu')" class="cursor-pointer">⋮</span>
                <div id="mainMenu">
                    <div class="menu-item" onclick="startGroupCreation()">New Group</div>
                    <div class="menu-item" onclick="clearAllData()">Clear All Data</div>
                </div>
            </div>
        </div>

        <div id="selectionNav" class="hidden flex justify-between items-center p-4 h-[64px]">
            <div class="flex items-center gap-6">
                <span onclick="cancelSelection()" class="cursor-pointer text-2xl">✕</span>
                <span id="selectCount" class="text-xl font-medium">1</span>
            </div>
            <div class="flex gap-6 text-xl relative">
                <span onclick="handleQuickAction('deleteChat')" class="cursor-pointer">🗑️</span>
                <span onclick="event.stopPropagation(); toggleMenu('selectionMenu')" class="cursor-pointer">⋮</span>
                <div id="selectionMenu">
                    <div class="menu-item" onclick="handleQuickAction('deleteChat')">Delete Chat</div>
                    <div class="menu-item" onclick="handleQuickAction('block')">Block Contact</div>
                    <div class="menu-item" onclick="handleQuickAction('hide')">Hide Chat</div>
                </div>
            </div>
        </div>

        <div id="searchBox" class="hidden px-4 pb-3">
            <input type="text" id="searchInput" onkeyup="filterChats()" placeholder="Search contacts..." class="w-full p-2 rounded-lg text-black outline-none">
        </div>
        <div class="flex justify-around font-bold text-[11px] pb-2 uppercase">
            <div class="border-b-4 border-white pb-1 px-4 text-white">CHATS</div>
            <div class="opacity-70 pb-1 px-4" onclick="location.href='posts.html'">POST</div>
            <div class="opacity-70 pb-1 px-4" onclick="location.href='videos.html'">VIDEOS</div>
            <div class="opacity-70 pb-1 px-4" onclick="location.href='reels.html'">REEL</div>
        </div>
    </header>

    <div id="chatList" class="pb-24"></div>

    <div class="fab" id="fabBtn" onclick="startGroupCreation()">
        <svg width="28" height="28" fill="white" viewBox="0 0 24 24"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </div>

    <div id="groupStep1" class="full-screen-modal">
        <div class="step-header"><button onclick="closeGroupModal()" class="text-2xl">←</button><div><h2 class="font-bold">New Group</h2><p class="text-xs">Add participants</p></div></div>
        <div id="contactSelectionList" class="flex-1 overflow-y-auto"></div>
        <button onclick="openGroupDetails()" class="fixed bottom-6 right-6 w-14 h-14 bg-orange-600 rounded-full text-white shadow-xl text-2xl">→</button>
    </div>

    <div id="groupStep2" class="full-screen-modal">
        <div class="step-header"><button onclick="document.getElementById('groupStep2').style.display='none'" class="text-2xl">←</button><h2 class="font-bold">Group Details</h2></div>
        <div class="p-6 flex flex-col gap-5 text-center">
            <input type="file" id="groupIconInput" accept="image/*" class="hidden" onchange="previewImage(this)">
            <div id="groupIconPreview" onclick="document.getElementById('groupIconInput').click()" class="w-24 h-24 bg-gray-200 rounded-full mx-auto flex items-center justify-center border-2 border-dashed border-gray-400 overflow-hidden cursor-pointer">
                <span id="camPlaceholderText">📷</span>
            </div>
            <p class="text-xs text-gray-500">Tap to select Group Icon</p>
            
            <input type="text" id="groupNameInp" placeholder="Group Name" class="border-b-2 border-orange-500 p-2 outline-none text-lg text-center">
            <input type="text" id="groupSloganInp" placeholder="Group Slogan (Optional)" class="border-b border-gray-300 p-2 text-sm text-center">
            
            <div class="mt-4 flex justify-between items-center p-2 border-t">
                <div class="text-left">
                    <p class="font-bold text-sm">Only Admin can send messages</p>
                    <p class="text-xs text-gray-500">If ON, others can only read</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="adminOnlyCheck">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        <button onclick="finishGroupCreation()" class="fixed bottom-6 right-6 w-14 h-14 bg-orange-600 rounded-full text-white shadow-xl flex items-center justify-center text-2xl">✓</button>
    </div>

    <script>
        const supa = window.supa;
        let selectedImgData = "";
        let selectedContact = null;
        let pressTimer;
        let currentUser = null;
        let currentUserId = "";
        let realtimeListChannel = null;
        let chatCache = [];
        const manualChatTargets = new Map();
        const MANUAL_TARGET_KEY_PREFIX = "manual_chat_targets:";

        function isUuid(value){
            return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(String(value || "").trim());
        }

        function maybeMissingColumn(error){
            const text = `${error?.message || ""} ${error?.details || ""}`.toLowerCase();
            return text.includes("column") && text.includes("does not exist");
        }

        function displayName(user){
            return String(user?.display_name || user?.full_name || user?.username || "User").trim() || "User";
        }

        function avatarUrl(user){
            return String(user?.photo || user?.avatar_url || "").trim();
        }

        function sanitizeNameForQuery(value){
            return String(value || "User").trim().slice(0, 80);
        }

        function sanitizeImageForQuery(value){
            const img = String(value || "").trim();
            if(!img) return "";
            if(/^data:/i.test(img)) return "";
            if(img.length > 400) return "";
            if(/^https?:\/\//i.test(img)) return img;
            if(img.startsWith("/")) return img;
            return "";
        }

        function itemKey(item){
            return item?.isGroup ? `group:${item.id}` : `user:${item.id}`;
        }

        function getStoredArray(key){
            try{
                const parsed = JSON.parse(localStorage.getItem(key) || "[]");
                return Array.isArray(parsed) ? parsed : [];
            }catch(_){
                return [];
            }
        }

        function maybeMissingResource(error, resource){
            const text = `${error?.message || ""} ${error?.details || ""}`.toLowerCase();
            const missing = text.includes("does not exist") || text.includes("not found") || text.includes("undefined");
            return missing && text.includes(String(resource || "").toLowerCase());
        }

        function manualTargetStorageKey(){
            return `${MANUAL_TARGET_KEY_PREFIX}${currentUserId}`;
        }

        function loadManualChatTargets(){
            manualChatTargets.clear();
            if(!isUuid(currentUserId)) return;
            const rows = getStoredArray(manualTargetStorageKey());
            rows.forEach(row => {
                const id = String(row?.id || "").trim();
                if(!isUuid(id) || id === currentUserId) return;
                manualChatTargets.set(id, {
                    id,
                    name: sanitizeNameForQuery(row?.name || "User"),
                    img: sanitizeImageForQuery(row?.img || ""),
                    updated_at: Number(row?.updated_at || 0) || 0
                });
            });
        }

        function saveManualChatTargets(){
            if(!isUuid(currentUserId)) return;
            const payload = Array.from(manualChatTargets.values()).slice(0, 300);
            localStorage.setItem(manualTargetStorageKey(), JSON.stringify(payload));
        }

        function rememberManualChatTarget(uid, profile){
            const cleanId = String(uid || "").trim();
            if(!isUuid(cleanId) || cleanId === currentUserId) return;
            const existing = manualChatTargets.get(cleanId) || {};
            const p = profile && typeof profile === "object" ? profile : {};
            manualChatTargets.set(cleanId, {
                id: cleanId,
                name: sanitizeNameForQuery(displayName(p) || existing.name || "User"),
                img: sanitizeImageForQuery(avatarUrl(p) || existing.img || ""),
                updated_at: Date.now()
            });
            saveManualChatTargets();
        }

        async function resolveCurrentUser(){
            if(window.NOVA && typeof window.NOVA.requireUser === "function"){
                return await window.NOVA.requireUser();
            }
            const { data, error } = await supa.auth.getUser();
            if(error) throw error;
            return data?.user || null;
        }

        function buildOpenChatUrl(id, opts){
            const options = opts || {};
            const qp = new URLSearchParams();
            qp.set("id", String(id || "").trim());
            const safeName = sanitizeNameForQuery(options.name || "");
            const safeImg = sanitizeImageForQuery(options.img || "");
            if(safeName) qp.set("name", safeName);
            if(safeImg) qp.set("img", safeImg);
            if(options.callAction) qp.set("call_action", String(options.callAction));
            if(options.callId) qp.set("call_id", String(options.callId));
            if(options.isGroup) qp.set("isGroup", "true");
            return `open-chat.html?${qp.toString()}`;
        }

        async function fetchUserById(uid){
            const attempts = [
                "user_id,username,full_name,display_name,photo,avatar_url",
                "user_id,username,full_name,display_name,photo",
                "user_id,username,full_name,photo",
                "user_id,username,full_name"
            ];
            for(const fields of attempts){
                const { data, error } = await supa.from("users").select(fields).eq("user_id", uid).maybeSingle();
                if(!error) return data || null;
                if(!maybeMissingColumn(error)) break;
            }
            return null;
        }

        async function fetchUsersByIds(userIds){
            const ids = Array.from(userIds || []).map(id => String(id || "").trim()).filter(id => isUuid(id) && id !== currentUserId);
            if(!ids.length) return [];
            const attempts = [
                "user_id,username,full_name,display_name,photo,avatar_url",
                "user_id,username,full_name,display_name,photo",
                "user_id,username,full_name,photo",
                "user_id,username,full_name"
            ];
            for(const fields of attempts){
                const { data, error } = await supa
                    .from("users")
                    .select(fields)
                    .in("user_id", ids)
                    .limit(Math.max(200, ids.length + 10));
                if(!error) return data || [];
                if(!maybeMissingColumn(error)){
                    console.error("users_fetch_failed", error);
                    return [];
                }
            }
            return [];
        }

        function putRecentContact(map, userId, createdAt){
            const id = String(userId || "").trim();
            if(!isUuid(id) || id === currentUserId) return;
            const ts = Number(new Date(createdAt || 0).getTime()) || 0;
            const prev = Number(map.get(id) || 0);
            if(ts > prev) map.set(id, ts);
            if(!map.has(id)) map.set(id, prev || 0);
        }

        async function fetchRecentContactsFromMessages(){
            const recent = new Map();
            try{
                const { data, error } = await supa
                    .from("messages")
                    .select("sender_id,receiver_id,created_at")
                    .or(`sender_id.eq.${currentUserId},receiver_id.eq.${currentUserId}`)
                    .order("created_at", { ascending: false })
                    .limit(1200);
                if(error){
                    if(!maybeMissingResource(error, "messages")){
                        console.error("message_contacts_failed", error);
                    }
                    return recent;
                }
                (data || []).forEach(row => {
                    const senderId = String(row?.sender_id || "").trim();
                    const receiverId = String(row?.receiver_id || "").trim();
                    const otherId = senderId === currentUserId ? receiverId : senderId;
                    putRecentContact(recent, otherId, row?.created_at);
                });
            }catch(err){
                console.error("message_contacts_exception", err);
            }
            return recent;
        }

        async function fetchRecentContactsFromChats(){
            const recent = new Map();
            try{
                const { data, error } = await supa
                    .from("chats")
                    .select("sender_id,receiver_id,created_at")
                    .or(`sender_id.eq.${currentUserId},receiver_id.eq.${currentUserId}`)
                    .order("created_at", { ascending: false })
                    .limit(1200);
                if(error){
                    if(!maybeMissingResource(error, "chats")){
                        console.error("chat_contacts_failed", error);
                    }
                    return recent;
                }
                (data || []).forEach(row => {
                    const senderId = String(row?.sender_id || "").trim();
                    const receiverId = String(row?.receiver_id || "").trim();
                    const otherId = senderId === currentUserId ? receiverId : senderId;
                    putRecentContact(recent, otherId, row?.created_at);
                });
            }catch(err){
                console.error("chat_contacts_exception", err);
            }
            return recent;
        }

        async function fetchFollowedUserIds(){
            const set = new Set();
            try{
                const { data, error } = await supa
                    .from("follows")
                    .select("following_id")
                    .eq("follower_id", currentUserId)
                    .limit(1000);
                if(error){
                    if(!maybeMissingResource(error, "follows")){
                        console.error("followed_users_failed", error);
                    }
                    return set;
                }
                (data || []).forEach(row => {
                    const id = String(row?.following_id || "").trim();
                    if(isUuid(id) && id !== currentUserId){
                        set.add(id);
                    }
                });
            }catch(err){
                console.error("followed_users_exception", err);
            }
            return set;
        }

        async function fetchPrivateUserRows(){
            const [messageRecent, chatRecent, followedIds] = await Promise.all([
                fetchRecentContactsFromMessages(),
                fetchRecentContactsFromChats(),
                fetchFollowedUserIds()
            ]);
            const recentByUser = new Map();
            messageRecent.forEach((ts, id) => putRecentContact(recentByUser, id, ts));
            chatRecent.forEach((ts, id) => putRecentContact(recentByUser, id, ts));
            followedIds.forEach(id => {
                if(isUuid(id) && id !== currentUserId && !recentByUser.has(id)){
                    recentByUser.set(id, 0);
                }
            });
            manualChatTargets.forEach((row, id) => {
                if(!isUuid(id) || id === currentUserId) return;
                const updated = Number(row?.updated_at || 0) || 0;
                const prev = Number(recentByUser.get(id) || 0);
                recentByUser.set(id, Math.max(prev, updated));
            });

            const ids = new Set(recentByUser.keys());
            const userRows = await fetchUsersByIds(ids);
            const userById = new Map();
            (userRows || []).forEach(row => {
                const id = String(row?.user_id || "").trim();
                if(!id) return;
                userById.set(id, row);
            });

            const mapped = Array.from(ids).map(id => {
                const userRow = userById.get(id) || {};
                const manual = manualChatTargets.get(id) || {};
                const name = displayName(userRow) || String(manual?.name || "User");
                const img = avatarUrl(userRow) || String(manual?.img || "");
                return {
                    id,
                    name: String(name || "User").trim() || "User",
                    img: String(img || "").trim(),
                    isGroup: false,
                    sortTs: Number(recentByUser.get(id) || 0)
                };
            }).filter(row => isUuid(row.id));

            mapped.sort((a, b) => {
                const diff = Number(b.sortTs || 0) - Number(a.sortTs || 0);
                if(diff !== 0) return diff;
                return String(a.name || "").localeCompare(String(b.name || ""));
            });

            return mapped;
        }

        async function fetchMyGroups(){
            const groupIds = new Set();
            try{
                const { data: memberRows, error: memberError } = await supa
                    .from("group_members")
                    .select("group_id")
                    .eq("user_id", currentUserId)
                    .limit(1000);
                if(!memberError){
                    (memberRows || []).forEach(row => {
                        const id = String(row?.group_id || "").trim();
                        if(id) groupIds.add(id);
                    });
                }else if(!maybeMissingResource(memberError, "group_members")){
                    console.error("group_members_fetch_failed", memberError);
                }
            }catch(err){
                console.error("group_members_fetch_exception", err);
            }
            if(!groupIds.size) return [];

            try{
                const { data: groups, error } = await supa
                    .from("groups")
                    .select("id,name,icon_url")
                    .in("id", Array.from(groupIds))
                    .limit(300);
                if(error){
                    if(!maybeMissingResource(error, "groups")){
                        console.error("groups_fetch_failed", error);
                    }
                    return [];
                }
                return (groups || []).map(g => ({
                    id: String(g?.id || "").trim(),
                    name: String(g?.name || "Group").trim() || "Group",
                    img: String(g?.icon_url || "").trim(),
                    isGroup: true
                })).filter(g => g.id);
            }catch(err){
                console.error("groups_fetch_exception", err);
                return [];
            }
        }

        async function maybeRouteDirectChat(){
            const q = new URLSearchParams(location.search);
            const uid = String(q.get("uid") || "").trim();
            if(!uid) return false;
            if(!isUuid(uid) || uid === currentUserId){
                alert("Invalid chat user.");
                return false;
            }
            const profile = await fetchUserById(uid);
            rememberManualChatTarget(uid, profile || {});
            location.replace(buildOpenChatUrl(uid, {
                name: displayName(profile),
                img: avatarUrl(profile),
                callAction: q.get("call_action") || "",
                callId: q.get("call_id") || ""
            }));
            return true;
        }

        function renderChatRows(items){
            const list = document.getElementById("chatList");
            list.innerHTML = "";
            const blocked = new Set(getStoredArray("blockedContacts"));
            const hidden = new Set(getStoredArray("hiddenChats"));

            const visibleItems = (items || []).filter(item => {
                const key = itemKey(item);
                return !blocked.has(key) && !hidden.has(key);
            });

            visibleItems.forEach(item => {
                const key = itemKey(item);
                const unseenKey = "unseen_" + key.replace(/[^a-z0-9_-]/gi, "_");
                const unreadCount = parseInt(localStorage.getItem(unseenKey) || "0", 10) || 0;
                const name = String(item.name || "User");
                const img = String(item.img || "");
                const isGroup = !!item.isGroup;

                const avatarHTML = img
                    ? `<div class="avatar" style="background-image:url('${img.replace(/'/g, "%27")}')"></div>`
                    : `<div class="avatar" style="background-color:#ff6a00">${name[0] || "U"}</div>`;
                const badge = isGroup ? `<span class="group-badge">Group</span>` : "";

                const row = document.createElement("div");
                row.className = "chat-item";
                row.id = "chat-" + key.replace(/[^a-z0-9_-]/gi, "_");
                row.innerHTML = `
                    ${avatarHTML}
                    <div class="ml-4 flex-1">
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-gray-800">${name}${badge}</span>
                            <span class="text-xs text-gray-400">Realtime</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <div class="text-sm text-gray-500 truncate w-4/5">${isGroup ? "Group chat" : "Tap to chat..."}</div>
                            ${unreadCount > 0 ? `<div class="unread-badge">${unreadCount}</div>` : ""}
                        </div>
                    </div>
                `;

                row.onmousedown = () => {
                    pressTimer = setTimeout(() => startSelection(item), 600);
                };
                row.onmouseup = () => clearTimeout(pressTimer);
                row.onmouseleave = () => clearTimeout(pressTimer);
                row.onclick = () => {
                    if(selectedContact) return;
                    localStorage.setItem(unseenKey, "0");
                    if(isGroup){
                        location.href = buildOpenChatUrl(item.id, {
                            name: name || "Group",
                            img: img || "",
                            isGroup: true
                        });
                        return;
                    }
                    if(!isUuid(item.id)){
                        alert("Invalid user id.");
                        return;
                    }
                    openChat(name, img, item.id);
                };

                list.appendChild(row);
            });
        }

        async function renderChats(){
            const list = document.getElementById("chatList");
            list.innerHTML = "<p class='text-center p-10 text-gray-400 animate-pulse'>Loading NovaGapp Chats...</p>";
            const [users, groups] = await Promise.all([
                fetchPrivateUserRows(),
                fetchMyGroups()
            ]);
            chatCache = [...(groups || []), ...(users || [])];
            renderChatRows(chatCache);
        }

        function startSelection(item){
            selectedContact = item;
            const key = itemKey(item);
            const row = document.getElementById("chat-" + key.replace(/[^a-z0-9_-]/gi, "_"));
            if(row) row.classList.add("selected");
            document.getElementById("mainHeader").classList.add("header-selection");
            document.getElementById("normalNav").classList.add("hidden");
            document.getElementById("selectionNav").classList.remove("hidden");
            document.getElementById("fabBtn").classList.add("hidden");
            document.getElementById("selectCount").textContent = "1";
        }

        function cancelSelection(){
            if(selectedContact){
                const key = itemKey(selectedContact);
                const row = document.getElementById("chat-" + key.replace(/[^a-z0-9_-]/gi, "_"));
                if(row) row.classList.remove("selected");
            }
            selectedContact = null;
            document.getElementById("mainHeader").classList.remove("header-selection");
            document.getElementById("normalNav").classList.remove("hidden");
            document.getElementById("selectionNav").classList.add("hidden");
            document.getElementById("fabBtn").classList.remove("hidden");
        }

        function handleQuickAction(action){
            if(!selectedContact) return;
            const key = itemKey(selectedContact);
            const listName = action === "block" ? "blockedContacts" : "hiddenChats";
            const list = getStoredArray(listName);
            if(!list.includes(key)) list.push(key);
            localStorage.setItem(listName, JSON.stringify(list));
            cancelSelection();
            renderChatRows(chatCache);
        }

        function previewImage(input){
            if(input.files && input.files[0]){
                const reader = new FileReader();
                reader.onload = e => {
                    selectedImgData = e.target.result;
                    document.getElementById("groupIconPreview").innerHTML = `<img src="${selectedImgData}" class="w-full h-full object-cover">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function finishGroupCreation(){
            const gName = document.getElementById("groupNameInp").value.trim();
            const gSlogan = document.getElementById("groupSloganInp").value.trim();
            const isAdminOnly = document.getElementById("adminOnlyCheck").checked;
            if(!gName) return alert("Please enter Group Name!");
            const { error } = await supa.from("groups").insert([{
                name: gName,
                slogan: gSlogan,
                is_admin_only: isAdminOnly,
                icon_url: selectedImgData
            }]);
            if(error){
                alert("Error creating group on backend");
                return;
            }
            document.getElementById("groupStep1").style.display = "none";
            document.getElementById("groupStep2").style.display = "none";
            await renderChats();
        }

        function openChat(name, img, id){
            if(!isUuid(id)) return;
            rememberManualChatTarget(id, { display_name: name, photo: img });
            location.href = buildOpenChatUrl(id, {
                name: name || "User",
                img: img || ""
            });
        }

        function toggleMenu(id){
            closeAllMenus();
            const el = document.getElementById(id);
            if(el) el.style.display = "block";
        }

        function closeAllMenus(){
            const m1 = document.getElementById("mainMenu");
            const m2 = document.getElementById("selectionMenu");
            if(m1) m1.style.display = "none";
            if(m2) m2.style.display = "none";
        }

        function startGroupCreation(){
            document.getElementById("groupStep1").style.display = "flex";
            loadSelectionContacts().catch(() => {});
        }

        async function loadSelectionContacts(){
            const selList = document.getElementById("contactSelectionList");
            selList.innerHTML = "<p class='p-4'>Loading contacts...</p>";
            const rows = await fetchPrivateUserRows();
            selList.innerHTML = "";
            rows.forEach(row => {
                const name = String(row?.name || "User");
                const img = String(row?.img || "");
                selList.innerHTML += `
                <div class="flex items-center p-4 border-b">
                    <input type="checkbox" class="w-5 h-5 mr-4 accent-orange-600">
                    <div class="avatar w-10 h-10 text-sm" style="background-image:url('${(img || "").replace(/'/g, "%27")}');background-color:#ff6a00">${img ? "" : (name[0] || "U")}</div>
                    <span class="ml-4 font-bold">${name}</span>
                </div>`;
            });
        }

        function openGroupDetails(){ document.getElementById("groupStep2").style.display = "flex"; }
        function closeGroupModal(){ document.getElementById("groupStep1").style.display = "none"; }
        function clearAllData(){ if(confirm("Clear local cache?")){ localStorage.clear(); location.reload(); } }
        function toggleSearch(){ document.getElementById("searchBox").classList.toggle("hidden"); }

        function filterChats(){
            const q = String(document.getElementById("searchInput").value || "").trim().toLowerCase();
            if(!q){
                renderChatRows(chatCache);
                return;
            }
            const filtered = chatCache.filter(item => String(item.name || "").toLowerCase().includes(q));
            renderChatRows(filtered);
        }

        function subscribeListRealtime(){
            if(realtimeListChannel){
                try{ supa.removeChannel(realtimeListChannel); }catch(_){ }
            }
            realtimeListChannel = supa
                .channel(`chat_list_${currentUserId}_${Date.now()}`)
                .on("postgres_changes", { event:"INSERT", schema:"public", table:"messages" }, () => {
                    renderChats().catch(() => {});
                })
                .on("postgres_changes", { event:"INSERT", schema:"public", table:"chats" }, () => {
                    renderChats().catch(() => {});
                })
                .subscribe();
        }

        async function initPage(){
            if(!supa){
                alert("Supabase unavailable. Please refresh.");
                return;
            }
            try{
                currentUser = await resolveCurrentUser();
            }catch(err){
                console.error("chat_current_user_failed", err);
            }
            currentUserId = String(currentUser?.id || "").trim();
            if(!isUuid(currentUserId)){
                alert("Please login with a valid account.");
                location.href = "login.html";
                return;
            }
            loadManualChatTargets();
            if(await maybeRouteDirectChat()){
                return;
            }
            await renderChats();
            subscribeListRealtime();
        }

        window.startSelection = startSelection;
        window.cancelSelection = cancelSelection;
        window.handleQuickAction = handleQuickAction;
        window.previewImage = previewImage;
        window.finishGroupCreation = finishGroupCreation;
        window.toggleMenu = toggleMenu;
        window.closeAllMenus = closeAllMenus;
        window.startGroupCreation = startGroupCreation;
        window.loadSelectionContacts = loadSelectionContacts;
        window.openGroupDetails = openGroupDetails;
        window.closeGroupModal = closeGroupModal;
        window.clearAllData = clearAllData;
        window.toggleSearch = toggleSearch;
        window.filterChats = filterChats;

        window.onload = initPage;
    </script>
</body>
</html>
