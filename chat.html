<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaGapp - Chats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="public-config.js"></script>
    <script src="global.js"></script>
    <script>
        // Backend logic initialize
        window.supa = window.supa || window.novaCreateSupabaseClient();
    </script>

        <style>
        :root {
            --nova-gradient: linear-gradient(90deg, #ff6a00 0%, #ee0979 100%);
            --selection-bg: #005c4b;
            --shell-max-width: 100%;
            --shell-gutter: 0px;
            --shell-border: transparent;
            --shell-shadow: none;
            --shell-radius: 0px;
            --item-pad-y: 10px;
            --item-pad-x: 12px;
            --item-min-h: 68px;
            --avatar-size: 46px;
            --avatar-font-size: 18px;
            --time-font-size: 10px;
            --fab-size: 56px;
            --fab-right: 14px;
        }
        * { box-sizing: border-box; }
        html, body {
            width: 100%;
            max-width: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        body {
            background: #fff;
            font-family: sans-serif;
            user-select: none;
            min-height: 100dvh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: var(--nova-gradient);
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: 0.3s;
            padding-top: env(safe-area-inset-top, 0px);
            width: min(var(--shell-max-width), calc(100% - var(--shell-gutter) - var(--shell-gutter)));
            margin: 0 auto;
            flex-shrink: 0;
            border-left: 1px solid var(--shell-border);
            border-right: 1px solid var(--shell-border);
            box-shadow: var(--shell-shadow);
        }
        .header-selection { background: var(--selection-bg) !important; }
        #normalNav, #selectionNav { min-height: 64px; }
        #chatList {
            width: min(var(--shell-max-width), calc(100% - var(--shell-gutter) - var(--shell-gutter)));
            margin: 0 auto;
            flex: 1 1 auto;
            min-height: 0;
            overflow-y: auto;
            overscroll-behavior: contain;
            background: #fff;
            padding-bottom: calc(100px + env(safe-area-inset-bottom, 0px));
            border-left: 1px solid var(--shell-border);
            border-right: 1px solid var(--shell-border);
            border-bottom-left-radius: var(--shell-radius);
            border-bottom-right-radius: var(--shell-radius);
        }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: var(--item-pad-y) var(--item-pad-x); border-bottom: 1px solid #f2f2f2; cursor: pointer; transition: 0.2s; position: relative; min-height: var(--item-min-h); }
        .chat-item.selected { background: #e9edef; }
        .avatar-wrap { position: relative; flex-shrink: 0; min-width: var(--avatar-size); min-height: var(--avatar-size); display: block; }
        .avatar { width: var(--avatar-size); height: var(--avatar-size); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; flex-shrink: 0; font-size: var(--avatar-font-size); overflow: hidden; background-size: cover; background-position: center; border: 1px solid #eee; }
        img.avatar { display: block; object-fit: cover; }
        .avatar-unread-dot { position: absolute; top: -2px; right: -2px; min-width: 18px; height: 18px; padding: 0 4px; border-radius: 999px; background: #ff6a00; color: #fff; border: 2px solid #fff; font-size: 10px; font-weight: 700; line-height: 1; display: flex; align-items: center; justify-content: center; }
        .chat-title-line { min-width: 0; gap: 8px; }
        .chat-title { min-width: 0; }
        .chat-time-label { flex-shrink: 0; white-space: nowrap; font-size: var(--time-font-size); }
        .full-screen-modal {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 1000;
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100dvh;
            overflow: hidden;
        }
        .step-header { background: var(--nova-gradient); color: white; padding: 16px; display: flex; align-items: center; gap: 15px; }

        #mainMenu, #selectionMenu { position: absolute; right: 10px; top: 50px; background: white; color: black; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: none; z-index: 200; width: 170px; }
        .menu-item { padding: 12px 16px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 14px; }
        .menu-item:last-child { border: none; }

        .fab {
            position: fixed;
            bottom: calc(22px + env(safe-area-inset-bottom, 0px));
            right: var(--fab-right);
            width: var(--fab-size);
            height: var(--fab-size);
            background: #ff6a00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 90;
            cursor: pointer;
        }

        .group-badge { background: #ff6a00; color: white; font-size: 9px; padding: 2px 5px; border-radius: 4px; margin-left: 5px; vertical-align: middle; text-transform: uppercase; }
        .pending-share-banner { margin: 10px 14px 0; padding: 10px 12px; border: 1px solid #ffd3b4; border-radius: 12px; background: #fff7f1; color: #8a4d12; font-size: 12px; line-height: 1.35; }
        .pending-share-banner strong { color: #7a3700; }
        .top-tabs {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 6px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            padding-left: 8px;
            padding-right: 8px;
        }
        .top-tabs > div { flex: 0 0 auto; padding-left: 10px; padding-right: 10px; }
        #contactSelectionList { padding-bottom: calc(110px + env(safe-area-inset-bottom, 0px)); }
        #contactSelectionList .avatar { width: 40px; height: 40px; font-size: 14px; }
        .modal-fab {
            bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            right: var(--fab-right);
        }

        @media (max-width: 640px) {
            .chat-item { gap: 10px; }
            .avatar-unread-dot { min-width: 16px; height: 16px; font-size: 9px; padding: 0 3px; }
            #normalNav, #selectionNav { padding-left: 12px; padding-right: 12px; }
            .avatar-wrap, .avatar { visibility: visible; opacity: 1; }
        }

        @media (min-width: 641px) and (max-width: 991px) {
            :root {
                --item-pad-y: 12px;
                --item-pad-x: 16px;
                --item-min-h: 74px;
                --avatar-size: 50px;
                --avatar-font-size: 19px;
                --time-font-size: 11px;
                --fab-size: 58px;
                --fab-right: 18px;
            }
            body { background: #f3f5f8; }
            #normalNav, #selectionNav { padding-left: 16px; padding-right: 16px; }
            .top-tabs { justify-content: center; gap: 8px; padding-left: 12px; padding-right: 12px; }
        }

        @media (min-width: 992px) and (max-width: 1279px) {
            :root {
                --shell-max-width: 1080px;
                --shell-gutter: 16px;
                --shell-border: #e3e7ee;
                --shell-shadow: 0 14px 34px rgba(15, 23, 42, 0.1);
                --shell-radius: 14px;
                --item-pad-y: 13px;
                --item-pad-x: 18px;
                --item-min-h: 78px;
                --avatar-size: 54px;
                --avatar-font-size: 21px;
                --time-font-size: 11px;
                --fab-size: 60px;
                --fab-right: max(20px, calc((100vw - 1080px) / 2 + 20px));
            }
            body { background: #eef2f7; }
            .header { border-top-left-radius: var(--shell-radius); border-top-right-radius: var(--shell-radius); }
            #normalNav, #selectionNav { padding-left: 18px; padding-right: 18px; }
            .top-tabs { justify-content: center; gap: 10px; }
        }

        @media (min-width: 1280px) {
            :root {
                --shell-max-width: 1240px;
                --shell-gutter: 22px;
                --shell-border: #dce2ec;
                --shell-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
                --shell-radius: 16px;
                --item-pad-y: 14px;
                --item-pad-x: 20px;
                --item-min-h: 82px;
                --avatar-size: 56px;
                --avatar-font-size: 22px;
                --time-font-size: 12px;
                --fab-size: 62px;
                --fab-right: max(24px, calc((100vw - 1240px) / 2 + 24px));
            }
            body { background: linear-gradient(180deg, #edf1f7 0%, #e5e9f0 100%); }
            .header { border-top-left-radius: var(--shell-radius); border-top-right-radius: var(--shell-radius); }
            #normalNav, #selectionNav { padding-left: 22px; padding-right: 22px; }
            .top-tabs { justify-content: center; gap: 14px; padding-left: 18px; padding-right: 18px; }
        }

        .hidden-chat-section { margin: 14px 12px 20px; border: 1px solid #f0d8c4; border-radius: 12px; overflow: hidden; background: #fff8f2; }
        .hidden-chat-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 12px; font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: #9a4b10; border-bottom: 1px solid #f4dfcf; background: #fff3e8; }
        .hidden-chat-item { background: #fffaf6; }
        .hidden-chat-item .chat-time-label { color: #b66a2b; font-weight: 600; }
        .hidden-chat-lock {
            width: 100%;
            border: 0;
            background: #fff8f2;
            color: #8a3f08;
            text-align: left;
            cursor: pointer;
            padding: 14px 14px 16px;
        }
        .hidden-chat-lock strong { display: block; font-size: 14px; font-weight: 700; }
        .hidden-chat-lock span { display: block; margin-top: 4px; font-size: 12px; color: #a25519; }
        .hidden-chat-lock-btn {
            border: 0;
            border-radius: 999px;
            padding: 5px 10px;
            font-size: 11px;
            line-height: 1;
            background: #ffd9bd;
            color: #8a3f08;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .switch { position: relative; display: inline-block; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ff6a00; }
        input:checked + .slider:before { transform: translateX(21px); }
    </style>
</head>
<body onclick="closeAllMenus()">

    <header id="mainHeader" class="header shadow-md">
        <div id="normalNav" class="flex justify-between items-center p-4">
            <h1 class="text-2xl font-bold tracking-tight">NovaGapp</h1>
            <div class="flex gap-5 text-xl relative">
                <span onclick="event.stopPropagation(); toggleSearch()" class="cursor-pointer">&#128269;</span>
                <span onclick="event.stopPropagation(); toggleMenu('mainMenu')" class="cursor-pointer">&#8942;</span>
                <div id="mainMenu">
                    <div class="menu-item" onclick="startGroupCreation()">New Group</div>
                    <div class="menu-item" onclick="configureHiddenPin()">Set Hidden PIN</div>
                    <div class="menu-item" onclick="clearAllData()">Clear All Data</div>
                </div>
            </div>
        </div>

        <div id="selectionNav" class="hidden flex justify-between items-center p-4 h-[64px]">
            <div class="flex items-center gap-6">
                <span onclick="cancelSelection()" class="cursor-pointer text-2xl">&#10005;</span>
                <span id="selectCount" class="text-xl font-medium">1</span>
            </div>
            <div class="flex gap-6 text-xl relative">
                <span onclick="handleQuickAction('deleteChat')" class="cursor-pointer">&#128465;</span>
                <span onclick="event.stopPropagation(); toggleMenu('selectionMenu')" class="cursor-pointer">&#8942;</span>
                <div id="selectionMenu">
                    <div class="menu-item" onclick="handleQuickAction('deleteChat')">Delete Chat</div>
                    <div class="menu-item" onclick="handleQuickAction('hide')">Hide Account</div>
                    <div class="menu-item" onclick="handleQuickAction('cancel')">Cancel</div>
                </div>
            </div>
        </div>

        <div id="searchBox" class="hidden px-4 pb-3">
            <input type="text" id="searchInput" onkeyup="filterChats()" placeholder="Search contacts..." class="w-full p-2 rounded-lg text-black outline-none">
        </div>
        <div class="top-tabs font-bold text-[11px] pb-2 uppercase">
            <div class="border-b-4 border-white pb-1 px-4 text-white">CHATS</div>
            <div class="opacity-70 pb-1 px-4" onclick="location.href='posts.html'">POST</div>
            <div class="opacity-70 pb-1 px-4" onclick="location.href='videos.html'">VIDEOS</div>
            <div class="opacity-70 pb-1 px-4" onclick="location.href='reels.html'">REEL</div>
        </div>
    </header>

    <div id="chatList" class="pb-24"></div>

    <div class="fab" id="fabBtn" onclick="startGroupCreation()">
        <svg width="28" height="28" fill="white" viewBox="0 0 24 24"><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </div>

    <div id="groupStep1" class="full-screen-modal">
        <div class="step-header"><button onclick="closeGroupModal()" class="text-2xl">&#8592;</button><div><h2 class="font-bold">New Group</h2><p class="text-xs">Add participants</p></div></div>
        <div id="contactSelectionList" class="flex-1 overflow-y-auto"></div>
        <button onclick="openGroupDetails()" class="fixed modal-fab w-14 h-14 bg-orange-600 rounded-full text-white shadow-xl text-2xl">&#8594;</button>
    </div>

    <div id="groupStep2" class="full-screen-modal">
        <div class="step-header"><button onclick="document.getElementById('groupStep2').style.display='none'" class="text-2xl">&#8592;</button><h2 class="font-bold">Group Details</h2></div>
        <div class="p-6 flex flex-col gap-5 text-center">
            <input type="file" id="groupIconInput" accept="image/*" class="hidden" onchange="previewImage(this)">
            <div id="groupIconPreview" onclick="document.getElementById('groupIconInput').click()" class="w-24 h-24 bg-gray-200 rounded-full mx-auto flex items-center justify-center border-2 border-dashed border-gray-400 overflow-hidden cursor-pointer">
                <span id="camPlaceholderText">&#128247;</span>
            </div>
            <p class="text-xs text-gray-500">Tap to select Group Icon</p>
            
            <input type="text" id="groupNameInp" placeholder="Group Name" class="border-b-2 border-orange-500 p-2 outline-none text-lg text-center">
            <input type="text" id="groupSloganInp" placeholder="Group Slogan (Optional)" class="border-b border-gray-300 p-2 text-sm text-center">
            
            <div class="mt-4 flex justify-between items-center p-2 border-t">
                <div class="text-left">
                    <p class="font-bold text-sm">Only Admin can send messages</p>
                    <p class="text-xs text-gray-500">If ON, others can only read</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="adminOnlyCheck">

                </label>

        <button onclick="finishGroupCreation()" class="fixed modal-fab w-14 h-14 bg-orange-600 rounded-full text-white shadow-xl flex items-center justify-center text-2xl">&#10003;</button>
    </div>

    <script>
        const supa = window.supa;
        let selectedImgData = "";
        let selectionPressTimer = null;
        const selectedContactsByKey = new Map();
        let currentUser = null;
        let currentUserId = "";
        let realtimeListChannel = null;
        let chatCache = [];
        let dbUnreadByKey = new Map();
        let selectedGroupMemberIds = new Set();
        let pendingReelShare = null;
        const manualChatTargets = new Map();
        const MANUAL_TARGET_KEY_PREFIX = "manual_chat_targets:";
        const PENDING_REEL_SHARE_KEY = "nova_pending_reel_share";
        const HIDDEN_CHATS_KEY = "hiddenChats";
        const BLOCKED_CONTACTS_KEY = "blockedContacts";
        const MANUAL_GROUP_KEY_PREFIX = "manual_groups:";
        const MANUAL_GROUP_MAX = 200;
        const HIDDEN_PIN_KEY_PREFIX = "hiddenChatPin:";
        const HIDDEN_UNLOCK_KEY_PREFIX = "hiddenChatUnlocked:";
        const manualGroups = new Map();

        function rowIdForKey(key){
            return "chat-" + String(key || "").replace(/[^a-z0-9_-]/gi, "_");
        }

        function getStoredSet(key){
            return new Set(getStoredArray(key).map(v => String(v || "").trim()).filter(Boolean));
        }

        function saveStoredSet(key, setObj){
            localStorage.setItem(key, JSON.stringify(Array.from(setObj || [])));
        }

        function hiddenPinStorageKey(){
            return `${HIDDEN_PIN_KEY_PREFIX}${currentUserId || "guest"}`;
        }

        function hiddenUnlockStorageKey(){
            return `${HIDDEN_UNLOCK_KEY_PREFIX}${currentUserId || "guest"}`;
        }

        function normalizeHiddenPin(value){
            return String(value || "").replace(/\D+/g, "").slice(0, 8);
        }

        function isValidHiddenPin(value){
            return /^\d{4,8}$/.test(String(value || ""));
        }

        function hashHiddenPin(value){
            const clean = normalizeHiddenPin(value);
            if(!clean) return "";
            let hash = 0;
            for(let i = 0; i < clean.length; i += 1){
                hash = (hash * 131 + clean.charCodeAt(i)) % 2147483647;
            }
            return `h${hash.toString(16)}`;
        }

        function getHiddenPinHash(){
            return String(localStorage.getItem(hiddenPinStorageKey()) || "").trim();
        }

        function setHiddenPinHash(value){
            const clean = String(value || "").trim();
            if(!clean){
                localStorage.removeItem(hiddenPinStorageKey());
                return;
            }
            localStorage.setItem(hiddenPinStorageKey(), clean);
        }

        function isHiddenChatsUnlocked(){
            return sessionStorage.getItem(hiddenUnlockStorageKey()) === "1";
        }

        function setHiddenChatsUnlocked(flag){
            if(flag){
                sessionStorage.setItem(hiddenUnlockStorageKey(), "1");
                return;
            }
            sessionStorage.removeItem(hiddenUnlockStorageKey());
        }

        function setupHiddenPin(forceReset){
            const existing = getHiddenPinHash();
            if(existing && !forceReset) return true;
            const first = normalizeHiddenPin(prompt(existing ? "Enter new 4-8 digit Hidden PIN" : "Set 4-8 digit Hidden PIN") || "");
            if(!first) return false;
            if(!isValidHiddenPin(first)){
                alert("PIN must be 4 to 8 digits.");
                return false;
            }
            const second = normalizeHiddenPin(prompt("Confirm Hidden PIN") || "");
            if(first !== second){
                alert("PIN mismatch. Try again.");
                return false;
            }
            setHiddenPinHash(hashHiddenPin(first));
            setHiddenChatsUnlocked(true);
            return true;
        }

        function unlockHiddenChats(){
            const storedHash = getHiddenPinHash();
            if(!storedHash){
                const created = setupHiddenPin(false);
                if(created) alert("Hidden PIN saved.");
                return created;
            }
            const entered = normalizeHiddenPin(prompt("Enter Hidden PIN") || "");
            if(!entered) return false;
            if(hashHiddenPin(entered) !== storedHash){
                alert("Incorrect Hidden PIN.");
                return false;
            }
            setHiddenChatsUnlocked(true);
            return true;
        }

        function lockHiddenChats(){
            setHiddenChatsUnlocked(false);
            renderChatRows(chatCache);
        }

        function configureHiddenPin(){
            const hasPin = !!getHiddenPinHash();
            if(hasPin){
                const proceed = confirm("Reset Hidden PIN?");
                if(!proceed) return;
            }
            const saved = setupHiddenPin(true);
            if(saved){
                alert("Hidden PIN updated.");
                renderChatRows(chatCache);
            }
        }

        function isSelectionMode(){
            return selectedContactsByKey.size > 0;
        }

        function manualGroupStorageKey(){
            return `${MANUAL_GROUP_KEY_PREFIX}${currentUserId}`;
        }

        function loadManualGroups(){
            manualGroups.clear();
            if(!isUuid(currentUserId)) return;
            const rows = getStoredArray(manualGroupStorageKey());
            rows.forEach(row => {
                const id = String(row?.id || "").trim();
                if(!id) return;
                manualGroups.set(id, {
                    id,
                    name: resolveGroupDisplayName(row, "Group"),
                    img: resolveGroupIconUrl(row?.img || row?.group_icon || row?.icon_url || ""),
                    owner_id: String(row?.owner_id || "").trim(),
                    owner_name: String(row?.owner_name || "").trim(),
                    isGroup: true,
                    updated_at: Number(row?.updated_at || 0) || 0
                });
            });
        }

        function saveManualGroups(){
            if(!isUuid(currentUserId)) return;
            const rows = Array.from(manualGroups.values())
                .sort((a, b) => Number(b?.updated_at || 0) - Number(a?.updated_at || 0))
                .slice(0, MANUAL_GROUP_MAX)
                .map(row => ({
                    id: String(row?.id || "").trim(),
                    name: resolveGroupDisplayName(row, "Group"),
                    img: resolveGroupIconUrl(row?.img || row?.group_icon || row?.icon_url || ""),
                    owner_id: String(row?.owner_id || "").trim(),
                    owner_name: String(row?.owner_name || "").trim(),
                    updated_at: Number(row?.updated_at || Date.now()) || Date.now()
                }));
            localStorage.setItem(manualGroupStorageKey(), JSON.stringify(rows));
        }

        function rememberManualGroup(group){
            const row = group && typeof group === "object" ? group : {};
            const id = String(row?.id || "").trim();
            if(!id) return;
            manualGroups.set(id, {
                id,
                name: resolveGroupDisplayName(row, "Group"),
                img: resolveGroupIconUrl(row?.img || row?.group_icon || row?.icon_url || ""),
                owner_id: String(row?.owner_id || "").trim(),
                owner_name: String(row?.owner_name || "").trim(),
                isGroup: true,
                updated_at: Date.now()
            });
            saveManualGroups();
        }

        function applySelectionUiState(){
            const active = isSelectionMode();
            document.getElementById("mainHeader").classList.toggle("header-selection", active);
            document.getElementById("normalNav").classList.toggle("hidden", active);
            document.getElementById("selectionNav").classList.toggle("hidden", !active);
            document.getElementById("fabBtn").classList.toggle("hidden", active);
            document.getElementById("selectCount").textContent = String(selectedContactsByKey.size || 0);
        }

        function clearSelectionHighlight(){
            document.querySelectorAll(".chat-item.selected").forEach(row => row.classList.remove("selected"));
        }

        function setChatClearedLocally(item){
            const row = item && typeof item === "object" ? item : {};
            const targetId = String(row?.id || "").trim();
            if(!targetId || !isUuid(currentUserId)) return;
            localStorage.setItem(`chat_cleared_at:${currentUserId}:${targetId}`, String(Date.now()));
            localStorage.removeItem(`deleted_for_me:${currentUserId}:${targetId}`);
            const key = itemKey(row);
            setLocalUnreadCountForKey(key, 0);
            dbUnreadByKey.set(key, 0);
        }

        function isUuid(value){
            return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(String(value || "").trim());
        }

        function maybeMissingColumn(error){

        async function sendPendingReelShareToChat(item){
            if(!pendingReelShare) return true;
            const row = item && typeof item === "object" ? item : {};
            const targetId = String(row.id || "").trim();
            const isGroup = !!row.isGroup;
            if(!targetId) return false;
            const messageText = buildPendingReelMessage(pendingReelShare);
            if(!messageText) return false;

            let sent = false;
            try{
                const base = isGroup
                    ? { sender_id: currentUserId, group_id: targetId, content: messageText }
                    : { sender_id: currentUserId, receiver_id: targetId, content: messageText };
                const candidates = [
                    { ...base, message_type: "reel", reel_url: pendingReelShare.url, is_read: false },
                    { ...base, message_type: "text", is_read: false },
                    { ...base, is_read: false },
                    base
                ];
                for(const candidate of candidates){
                    const { error } = await supa.from("messages").insert(candidate);
                    if(!error){
                        sent = true;
                        break;
                    }
                    const missingSchema = maybeMissingColumn(error) || maybeMissingResource(error, "messages");
                    if(!missingSchema){
                        break;
                    }
                }
            }catch(_){ }

            if(!sent && !isGroup && window.NOVA && typeof window.NOVA.sendChatMessage === "function"){
                try{
                    const res = await window.NOVA.sendChatMessage(targetId, messageText);
                    sent = !!res?.ok;
                }catch(_){ }
            }
            return sent;
        }

        async function fetchPrivateUserRows(){
            const [messageRecent, chatRecent, followedIds] = await Promise.all([
                fetchRecentContactsFromMessages(),
                fetchRecentContactsFromChats(),
                fetchFollowedUserIds()
            ]);
            const recentByUser = new Map();
            messageRecent.forEach((ts, id) => putRecentContact(recentByUser, id, ts));
            chatRecent.forEach((ts, id) => putRecentContact(recentByUser, id, ts));
            followedIds.forEach(id => {
                if(isUuid(id) && id !== currentUserId && !recentByUser.has(id)){
                    recentByUser.set(id, 0);
                }
            });
            manualChatTargets.forEach((row, id) => {
                if(!isUuid(id) || id === currentUserId) return;
                const updated = Number(row?.updated_at || 0) || 0;
                const prev = Number(recentByUser.get(id) || 0);
                recentByUser.set(id, Math.max(prev, updated));
            });

            const ids = new Set(recentByUser.keys());
            const userRows = await fetchUsersByIds(ids);
            const userById = new Map();
            (userRows || []).forEach(row => {
                const id = String(row?.user_id || row?.id || "").trim();

            const mapped = Array.from(ids).map(id => {

                const name = displayName(userRow) || String(manual?.name || "User");

                    sortTs: Number(recentByUser.get(id) || 0)

            mapped.sort((a, b) => {

                if(diff !== 0) return diff;
                return String(a.name || "").localeCompare(String(b.name || ""));
            });

            return mapped;
        }

                owner_id: String(extractGroupOwnerId(row) || row?.owner_id || "").trim(),
                owner_name: String(row?.owner_name || "").trim(),
                isGroup: true,
                sortTs: Number(row?.updated_at || row?.created_at || 0) || 0
            };

        function mergeGroupListRow(byId, raw){
            const next = normalizeGroupListRow(raw);
            if(!next.id) return;
            const prev = byId.get(next.id) || {};
            byId.set(next.id, {
                id: next.id,
                name: resolveGroupDisplayName({ group_name: next.name, name: prev.name }, "Group"),
                img: String(next.img || prev.img || "").trim(),
                owner_id: String(next.owner_id || prev.owner_id || "").trim(),
                owner_name: String(next.owner_name || prev.owner_name || "").trim(),
                isGroup: true,
                sortTs: Math.max(Number(prev.sortTs || 0), Number(next.sortTs || 0))
            });
        }

        async function fetchGroupMembershipRowsForCurrentUser(){
            if(!isUuid(currentUserId)) return [];
            try{
                const { data, error } = await supa
                    .from("group_members")
                    .select("group_id,user_id")
                    .eq("user_id", currentUserId)
                    .limit(2000);
                if(error){
                    if(!maybeMissingResource(error, "group_members")){
                        console.error("group_members_fetch_failed", error);
                    }

        async function fetchGroupsByIds(groupIds){
            const ids = Array.from(new Set(Array.from(groupIds || [])
                .map(id => String(id || "").trim())
                .filter(id => isUuid(id))));
            if(!ids.length) return [];
            const rows = [];
            for(const id of ids){
                try{
                    const { data, error } = await supa
                        .from("groups")
                        .select("*")
                        .eq("id", id)
                        .limit(1);
                    if(error){
                        if(!maybeMissingResource(error, "groups")){
                            console.error("group_fetch_failed", error);
                        }
                        continue;
                    }
                    if(Array.isArray(data) && data.length){
                        rememberObservedGroupFields(data[0]);
                        rows.push(data[0]);
                    }
                }catch(err){
                    console.error("group_fetch_exception", err);
                }
            }
            return rows;
        }

        async function fetchMyGroups(){
            const byId = new Map();
            const candidateGroupIds = new Set();
            const membershipRows = await fetchGroupMembershipRowsForCurrentUser();
            membershipRows.forEach(row => {
                const id = String(extractGroupMemberGroupId(row) || "").trim();
                if(id) candidateGroupIds.add(id);
            });

            Array.from(manualGroups.keys()).forEach(id => {
                if(isUuid(id)) candidateGroupIds.add(id);
            });

            const groupRows = await fetchGroupsByIds(candidateGroupIds);
            groupRows.forEach(row => {
                mergeGroupListRow(byId, row);
            });

            candidateGroupIds.forEach(id => {
                const manual = manualGroups.get(id) || {};
                const prev = byId.get(id) || {};
                byId.set(id, {
                    id,
                    name: resolveGroupDisplayName({ group_name: manual.name, name: prev.name }, "Group"),
                    img: String(prev.img || manual.img || "").trim(),
                    owner_id: String(prev.owner_id || manual.owner_id || "").trim(),
                    owner_name: String(prev.owner_name || manual.owner_name || "").trim(),
                    isGroup: true,
                    sortTs: Math.max(Number(prev.sortTs || 0), Number(manual.updated_at || manual.sortTs || 0) || 0)
                });
            });

            return Array.from(byId.values()).sort((a, b) => {
                const diff = Number(b.sortTs || 0) - Number(a.sortTs || 0);
                if(diff !== 0) return diff;
                return String(a.name || "").localeCompare(String(b.name || ""));
            });
        }

                const row = document.createElement("div");

                        </div>
                    </div>
                `;

                if(selectedContactsByKey.has(key)){
                    row.classList.add("selected");
                }

                const clearPress = () => {
                    if(selectionPressTimer){
                        clearTimeout(selectionPressTimer);
                        selectionPressTimer = null;
                    }
                };

                row.addEventListener("pointerdown", (event) => {
                    if(event.pointerType === "mouse" && event.button !== 0) return;
                    if(isSelectionMode()) return;
                    clearPress();
                    selectionPressTimer = setTimeout(() => {
                        row.dataset.skipClick = "1";
                        startSelection(item);
                    }, 560);
                });
                row.addEventListener("pointerup", clearPress);
                row.addEventListener("pointercancel", clearPress);
                row.addEventListener("pointerleave", clearPress);
                row.addEventListener("contextmenu", (event) => {
                    event.preventDefault();
                    event.stopPropagation();
                    clearPress();
                    row.dataset.skipClick = "1";
                    startSelection(item);
                });

                    event.stopPropagation();
                    clearPress();

                        row.dataset.skipClick = "0";
                        return;

        async function insertGroupWithFallback(payload){
            const row = payload && typeof payload === "object" ? payload : {};
            const cleanName = String(row.name || row.group_name || "").trim();
            const cleanIcon = String(row.icon_url || row.group_icon || "").trim();
            const ownerId = isUuid(currentUserId) ? String(currentUserId || "").trim() : String(row.owner_id || "").trim();
            if(!cleanName) return { ok:false, error:new Error("group_name_required"), groupId:"" };
            if(!ownerId) return { ok:false, error:new Error("group_owner_required"), groupId:"" };

            const preferName = observedGroupFields.has("name") || !observedGroupFields.has("group_name");
            const preferIconUrl = observedGroupFields.has("icon_url") || !observedGroupFields.has("group_icon");
            const insertCandidates = [];
            const pushCandidate = (candidate) => {
                const src = candidate && typeof candidate === "object" ? candidate : {};
                const normalized = {};
                Object.keys(src).forEach(key => {
                    if(src[key] !== undefined && src[key] !== null && src[key] !== "") normalized[key] = src[key];
                });
                const signature = JSON.stringify(normalized);
                if(!signature || insertCandidates.some(item => item.signature === signature)) return;
                insertCandidates.push({ signature, value: normalized });
            };

            const addNameFields = (target, includeBoth) => {
                if(includeBoth || preferName) target.name = cleanName;
                if(includeBoth || !preferName) target.group_name = cleanName;
                return target;
            };
            const addIconFields = (target, mode) => {
                if(!cleanIcon) return target;
                if(mode === "icon_url" || mode === "both") target.icon_url = cleanIcon;
                if(mode === "group_icon" || mode === "both") target.group_icon = cleanIcon;
                return target;
            };

            pushCandidate(addIconFields(addNameFields({ owner_id: ownerId }, false), preferIconUrl ? "icon_url" : "group_icon"));
            pushCandidate(addIconFields(addNameFields({ owner_id: ownerId }, false), preferIconUrl ? "group_icon" : "icon_url"));
            pushCandidate(addNameFields({ owner_id: ownerId }, false));
            pushCandidate(addIconFields(addNameFields({ owner_id: ownerId }, true), preferIconUrl ? "icon_url" : "group_icon"));
            pushCandidate(addIconFields(addNameFields({ owner_id: ownerId }, true), "both"));
            pushCandidate(addNameFields({ owner_id: ownerId }, true));

            let insertError = null;
            for(const entry of insertCandidates){
                try{
                    const inserted = await supa
                        .from("groups")
                        .insert(entry.value)
                        .select("*")
                        .maybeSingle();
                    if(!inserted?.error){
                        rememberObservedGroupFields(inserted?.data || entry.value);
                        const groupId = String(inserted?.data?.id || "").trim();
                        if(groupId){
                            return { ok:true, data: inserted.data, groupId };
                        }
                        const resolvedAfterInsert = await resolveInsertedGroupRow({ expectedName: cleanName, preferredId: "" });
                        const resolvedIdAfterInsert = String(extractGroupId(resolvedAfterInsert) || resolvedAfterInsert?.id || "").trim();
                        if(resolvedIdAfterInsert){
                            return { ok:true, data: resolvedAfterInsert, groupId: resolvedIdAfterInsert };
                        }
                        return { ok:true, data: inserted.data || entry.value, groupId:"" };
                    }
                    insertError = inserted.error;
                    const txt = `${inserted.error?.message || ""} ${inserted.error?.details || ""} ${inserted.error?.hint || ""}`.toLowerCase();
                    const missingColumnName = extractMissingColumnName(inserted.error);
                    if(maybeMissingColumn(inserted.error)){
                        if(missingColumnName) observedGroupFields.delete(missingColumnName);
                        continue;
                    }
                    const nullColumn = extractNullColumnName(inserted.error);
                    if(nullColumn === "name"){
                        observedGroupFields.add("name");
                        continue;
                    }
                    if(txt.includes("permission") && txt.includes("select")){
                        const fallbackInsert = await supa.from("groups").insert(entry.value);
                        if(!fallbackInsert?.error){
                            rememberObservedGroupFields(entry.value);
                            const resolvedAfterInsert = await resolveInsertedGroupRow({ expectedName: cleanName, preferredId: "" });
                            const resolvedIdAfterInsert = String(extractGroupId(resolvedAfterInsert) || resolvedAfterInsert?.id || "").trim();
                            if(resolvedIdAfterInsert){
                                return { ok:true, data: resolvedAfterInsert, groupId: resolvedIdAfterInsert };
                            }
                            return { ok:true, data: entry.value, groupId:"" };
                        }
                        insertError = fallbackInsert.error;
                        if(maybeMissingColumn(fallbackInsert.error)){
                            const fallbackMissing = extractMissingColumnName(fallbackInsert.error);
                            if(fallbackMissing) observedGroupFields.delete(fallbackMissing);
                            continue;
                        }
                    }
                }catch(err){
                    insertError = err;
                    if(maybeMissingColumn(err)){
                        const missingColumnName = extractMissingColumnName(err);
                        if(missingColumnName) observedGroupFields.delete(missingColumnName);
                        continue;
                    }
                }
            }

            const resolved = await resolveInsertedGroupRow({ expectedName: cleanName, preferredId: "" });
            const resolvedId = String(extractGroupId(resolved) || resolved?.id || "").trim();
            if(resolvedId){
                return { ok:true, data: resolved, groupId: resolvedId };
            }
            return { ok:false, error: insertError || new Error("group_insert_failed"), groupId:"" };
        }
        async function insertGroupMemberCompat(groupId, member){
            const cleanGroupId = String(groupId || "").trim();
            const cleanUserId = String(member?.user_id || member?.id || "").trim();
            if(!cleanGroupId || !cleanUserId) return false;

            const verifyMembership = async () => {
                try{
                    const { data, error } = await supa
                        .from("group_members")
                        .select("group_id,user_id")
                        .eq("group_id", cleanGroupId)
                        .eq("user_id", cleanUserId)
                        .limit(1);
                    if(error) return false;
                    return Array.isArray(data) && data.length > 0;
                }catch(_){
                    return false;
                }
            };

            try{
                const { error } = await supa.from("group_members").insert({
                    group_id: cleanGroupId,
                    user_id: cleanUserId
                });
                if(!error) return true;
                const errText = `${error?.message || ""} ${error?.details || ""}`.toLowerCase();
                const duplicate = errText.includes("duplicate") || String(error?.code || "") === "23505";
                if(duplicate) return true;
                return await verifyMembership();
            }catch(_){
                return await verifyMembership();
            }
        }

        async function insertGroupSystemMessage(groupId, text){
            const cleanGroupId = String(groupId || "").trim();
            const content = truncateText(text, 220);
            if(!cleanGroupId || !content || !isUuid(currentUserId)) return false;
            const base = {
                sender_id: currentUserId,
                group_id: cleanGroupId,
                content
            };
            const variants = [
                { ...base, message_type: "system", is_read: false },
                { ...base, message_type: "text", is_read: false },
                { ...base, is_read: false },
                base
            ];
            for(const candidate of variants){
                const { error } = await supa.from("messages").insert(candidate);
                if(!error) return true;
                const missingSchema = maybeMissingColumn(error) || maybeMissingResource(error, "messages");
                if(!missingSchema) return false;
            }
            return false;
        }

            const profileById = new Map();
            (profileRows || []).forEach(profile => {
                const uid = String(profile?.user_id || "").trim();
                if(uid) profileById.set(uid, profile);
            });
            for(const memberId of membersToAdd){
                if(memberId === currentUserId) continue;
                const profile = profileById.get(memberId) || {};
                await insertGroupMemberCompat(groupId, {
                    user_id: memberId,
                    user_name: displayName(profile),
                    user_avatar: avatarUrl(profile),
                    role: "member"
                });
            }

            await insertGroupSystemMessage(groupId, `${ownerName} created this group`).catch(() => {});
            rememberManualGroup({
                id: groupId,
                name: gName,
                img: createdGroupIcon,
                owner_id: currentUserId,
                owner_name: ownerName
            });
            document.getElementById("groupStep1").style.display = "none";
            document.getElementById("groupStep2").style.display = "none";
            resetGroupDraft();
            await renderChats();
        }

        function openChat(name, img, id){
            if(!isUuid(id)) return;
            rememberManualChatTarget(id, { display_name: name, photo: img });
            location.href = buildOpenChatUrl(id, {
                name: name || "User",
                img: img || ""
            });
        }

        function toggleMenu(id){
            closeAllMenus();
            const el = document.getElementById(id);
            if(el) el.style.display = "block";
        }

        function closeAllMenus(){
            const m1 = document.getElementById("mainMenu");
            const m2 = document.getElementById("selectionMenu");
            if(m1) m1.style.display = "none";
            if(m2) m2.style.display = "none";
        }

        function startGroupCreation(){
            resetGroupDraft();
            document.getElementById("groupStep1").style.display = "flex";
            loadSelectionContacts().catch(() => {});
        }

        async function loadSelectionContacts(){
            const selList = document.getElementById("contactSelectionList");
            selList.innerHTML = "<p class='p-4'>Loading contacts...</p>";
            selectedGroupMemberIds = new Set();
            const rows = await fetchPrivateUserRows();
            selList.innerHTML = "";
            rows.forEach(row => {
                const userId = String(row?.id || "").trim();
                if(!isUuid(userId) || userId === currentUserId) return;
                const name = String(row?.name || "User");
                const img = String(row?.img || "");
                selList.innerHTML += `
                <div class="flex items-center p-4 border-b">
                    <input type="checkbox" data-group-member-id="${userId}" class="w-5 h-5 mr-4 accent-orange-600">
                    <div class="avatar w-10 h-10 text-sm" style="background-image:url('${(img || "").replace(/'/g, "%27")}');background-color:#ff6a00">${img ? "" : (name[0] || "U")}</div>
                    <span class="ml-4 font-bold">${name}</span>
                </div>`;
            });
            selList.querySelectorAll("[data-group-member-id]").forEach(box => {
                box.addEventListener("change", (event) => {
                    const id = String(event?.target?.getAttribute("data-group-member-id") || "").trim();
                    if(!isUuid(id)) return;
                    if(event.target.checked){
                        selectedGroupMemberIds.add(id);
                    }else{
                        selectedGroupMemberIds.delete(id);
                    }
                });
            });
        }

        function openGroupDetails(){
            if(selectedGroupMemberIds.size < 1){
                alert("Please select at least one member.");
                return;
            }
            document.getElementById("groupStep2").style.display = "flex";
        }

        function closeGroupModal(){
            document.getElementById("groupStep1").style.display = "none";
            document.getElementById("groupStep2").style.display = "none";
            resetGroupDraft();
        }
        function clearAllData(){ if(confirm("Clear local cache?")){ localStorage.clear(); location.reload(); } }
        function toggleSearch(){ document.getElementById("searchBox").classList.toggle("hidden"); }

        function filterChats(){
            const q = String(document.getElementById("searchInput").value || "").trim().toLowerCase();
            if(!q){
                renderChatRows(chatCache);
                return;
            }
            const filtered = chatCache.filter(item => String(item.name || "").toLowerCase().includes(q));
            renderChatRows(filtered);
        }

        function subscribeListRealtime(){
            if(realtimeListChannel){
                try{ supa.removeChannel(realtimeListChannel); }catch(_){ }
            }
            const bumpUnreadFromMessage = (row) => {
                const receiver = String(row?.receiver_id || "").trim();
                const sender = String(row?.sender_id || "").trim();
                const groupId = String(row?.group_id || "").trim();

                if(groupId){
                    if(sender === currentUserId) return;
                    const key = `group:${groupId}`;
                    dbUnreadByKey.set(key, Number(dbUnreadByKey.get(key) || 0) + 1);
                    bumpLocalUnreadCountForKey(key, 1);
                    const hidden = getStoredSet(HIDDEN_CHATS_KEY);
                    if(hidden.has(key)){
                        hidden.delete(key);
                        saveStoredSet(HIDDEN_CHATS_KEY, hidden);
                    }
                    renderChatRows(chatCache);
                    return;
                }

                if(receiver !== currentUserId || !isUuid(sender) || sender === currentUserId) return;
                const key = `user:${sender}`;
                dbUnreadByKey.set(key, Number(dbUnreadByKey.get(key) || 0) + 1);
                bumpLocalUnreadCountForKey(key, 1);
                const hidden = getStoredSet(HIDDEN_CHATS_KEY);
                if(hidden.has(key)){
                    hidden.delete(key);
                    saveStoredSet(HIDDEN_CHATS_KEY, hidden);
                }
                renderChatRows(chatCache);
            };
            realtimeListChannel = supa
                .channel(`chat_list_${currentUserId}_${Date.now()}`)
                .on("postgres_changes", { event:"INSERT", schema:"public", table:"messages" }, (payload) => {
                    bumpUnreadFromMessage(payload?.new || {});
                    renderChats().catch(() => {});
                })
                .on("postgres_changes", { event:"INSERT", schema:"public", table:"chats" }, () => {
                    renderChats().catch(() => {});
                })
                .subscribe();
        }

        async function initPage(){
            if(!supa){
                alert("Supabase unavailable. Please refresh.");
                return;
            }
            try{
                currentUser = await resolveCurrentUser();
            }catch(err){
                console.error("chat_current_user_failed", err);
            }
            currentUserId = String(currentUser?.id || "").trim();
            if(!isUuid(currentUserId)){
                alert("Please login with a valid account.");
                location.href = "login.html";
                return;
            }
            loadManualChatTargets();
            loadManualGroups();
            pendingReelShare = loadPendingReelShare();
            if(await maybeRouteDirectChat()){
                return;
            }
            await renderChats();
            subscribeListRealtime();
        }

        window.startSelection = startSelection;
        window.cancelSelection = cancelSelection;
        window.handleQuickAction = handleQuickAction;
        window.previewImage = previewImage;
        window.finishGroupCreation = finishGroupCreation;
        window.toggleMenu = toggleMenu;
        window.closeAllMenus = closeAllMenus;
        window.startGroupCreation = startGroupCreation;
        window.loadSelectionContacts = loadSelectionContacts;
        window.openGroupDetails = openGroupDetails;
        window.closeGroupModal = closeGroupModal;
        window.clearAllData = clearAllData;
        window.toggleSearch = toggleSearch;
        window.filterChats = filterChats;

        window.onload = initPage;
    </script>
</body>
</html>
