<!DOCTYPE html>
<html>
<head>
  <title>Edit Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="public-config.js"></script>

  <script>
    window.supa = window.supa || window.novaCreateSupabaseClient();
  </script>

  <script src="global.js"></script>

  <style>
    .edit-wrap{ padding:20px }
    .avatar-big{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;
      display:block;
      margin:10px auto;
      background:#f2f2f2;
    }
    .edit-wrap input{
      width:100%;
      padding:12px;
      margin-top:12px;
      border-radius:8px;
      border:1px solid #ddd;
    }
    .edit-wrap textarea{
      width:100%;
      padding:12px;
      margin-top:12px;
      border-radius:8px;
      border:1px solid #ddd;
      resize:vertical;
      min-height:90px;
    }
  </style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9977276800228616"
     crossorigin="anonymous"></script>
</head>

<body>

<header class="top">
  <span class="company-name">Edit Profile</span>
</header>

<div class="edit-wrap">

  <img id="avatar" class="avatar-big"
    src="https://img.icons8.com/fluency/96/user-male-circle.png"/>

  <input type="file" id="photoFile" accept="image/*">
  <input id="username" placeholder="Username">
  <input id="fullName" placeholder="Full Name">
  <textarea id="bio" placeholder="Bio"></textarea>
  <input id="contactInfo" placeholder="Contact Info (phone/email)">

  <button id="saveBtn" class="login-btn" style="margin-top:20px" disabled>
    Save Changes
  </button>

</div>

<script>
const supa = window.supa;
if(!supa){
  location.href = "login.html";
  throw new Error("supabase_client_unavailable");
}

const avatar = document.getElementById("avatar");
const photoFile = document.getElementById("photoFile");
const username = document.getElementById("username");
const fullName = document.getElementById("fullName");
const bio = document.getElementById("bio");
const contactInfo = document.getElementById("contactInfo");
const saveBtn = document.getElementById("saveBtn");

let CURRENT_USER = null;
let NEW_PHOTO_FILE = null;
const USER_KEY_CANDIDATES = ["user_id", "id"];

function getSupabaseErrorText(error){
  return [error?.message, error?.details, error?.hint].filter(Boolean).join(" ");
}

function getMissingColumnName(error){
  const text = getSupabaseErrorText(error);
  if(!text) return "";

  const pgrstMatch = text.match(/'([a-zA-Z0-9_]+)' column/i);
  if(pgrstMatch && pgrstMatch[1]) return String(pgrstMatch[1]).toLowerCase();

  const pgMatch = text.match(/column\s+\"?([a-zA-Z0-9_.]+)\"?\s+does not exist/i);
  if(pgMatch && pgMatch[1]){
    const normalized = String(pgMatch[1]).replace(/\"/g, "").toLowerCase();
    return normalized.split(".").pop() || "";
  }
  return "";
}

async function loadUsersProfileRow(userId){
  for(const key of USER_KEY_CANDIDATES){
    const { data, error } = await supa
      .from("users")
      .select("*")
      .eq(key, userId)
      .maybeSingle();

    if(!error){
      return { data: data || null, error:null };
    }

    const missing = getMissingColumnName(error);
    if(missing && missing === key){
      continue;
    }
    return { data:null, error };
  }
  return { data:null, error:null };
}

async function updateUsersProfileRow(userId, basePayload){
  for(const key of USER_KEY_CANDIDATES){
    let payload = { ...basePayload };
    for(let attempt = 0; attempt < 16; attempt += 1){
      const { data, error } = await supa
        .from("users")
        .update(payload)
        .eq(key, userId)
        .select();

      if(!error){
        return { data:Array.isArray(data) ? data : [], error:null, payload };
      }

      const missing = getMissingColumnName(error);
      if(missing){
        if(missing === key){
          break;
        }
        if(Object.prototype.hasOwnProperty.call(payload, missing)){
          delete payload[missing];
          continue;
        }
      }
      return { data:null, error, payload };
    }
  }
  return {
    data:null,
    error:new Error("Unable to update users row."),
    payload: { ...basePayload }
  };
}

async function insertUsersProfileRow(userId, basePayload){
  for(const key of USER_KEY_CANDIDATES){
    let payload = {
      [key]: userId,
      ...basePayload
    };
    for(let attempt = 0; attempt < 16; attempt += 1){
      const { error } = await supa
        .from("users")
        .insert(payload);

      if(!error){
        return { error:null };
      }

      const missing = getMissingColumnName(error);
      if(missing){
        if(missing === key){
          break;
        }
        if(Object.prototype.hasOwnProperty.call(payload, missing)){
          delete payload[missing];
          continue;
        }
      }
      return { error };
    }
  }
  return { error:new Error("Unable to insert users row.") };
}

/* LOAD PROFILE */
async function loadProfile(){

  const { data } = await supa.auth.getSession();
  if(!data.session){
    location.href = "login.html";
    return;
  }

  CURRENT_USER = data.session.user;
  saveBtn.disabled = false;

  const profileRead = await loadUsersProfileRow(CURRENT_USER.id);
  if(profileRead.error){
    console.warn("profile_load_error:", profileRead.error);
  }
  const profile = profileRead.data || null;

  const metaName =
    CURRENT_USER.user_metadata?.full_name ||
    CURRENT_USER.user_metadata?.name ||
    "";
  const metaPhoto =
    CURRENT_USER.user_metadata?.avatar_url ||
    CURRENT_USER.user_metadata?.picture ||
    null;

  if(profile && typeof profile === "object"){
    username.value = profile.username || profile.name || metaName || "";
    fullName.value = profile.full_name || profile.name || metaName || "";
    bio.value = profile.bio || "";
    contactInfo.value =
      profile.contact_info ||
      profile.phone_number ||
      profile.phone ||
      profile.email ||
      "";
    if(profile.photo) avatar.src = profile.photo;
    else if(metaPhoto) avatar.src = metaPhoto;
  }else{
    username.value = metaName || "";
    fullName.value = metaName || "";
    if(metaPhoto) avatar.src = metaPhoto;
  }
}

/* PREVIEW */
photoFile.onchange = e=>{
  NEW_PHOTO_FILE = e.target.files[0];
  if(NEW_PHOTO_FILE){
    avatar.src = URL.createObjectURL(NEW_PHOTO_FILE);
  }
};

/* SAVE */
saveBtn.onclick = async ()=>{

  const usernameVal = username.value.trim();
  const fullNameVal = fullName.value.trim();
  const bioVal = bio.value.trim();
  const contactInfoVal = contactInfo.value.trim();
  if(!usernameVal){
    alert("Username required");
    return;
  }

  let photoURL = null;

  if(NEW_PHOTO_FILE){
    photoURL = await new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(new Error("Photo read failed"));
      reader.readAsDataURL(NEW_PHOTO_FILE);
    });
  }

  const payload = {
    username: usernameVal,
    full_name: fullNameVal,
    name: fullNameVal,
    bio: bioVal,
    contact_info: contactInfoVal,
    phone_number: contactInfoVal,
    phone: contactInfoVal
  };

  if(photoURL) payload.photo = photoURL;

  const updateResult = await updateUsersProfileRow(CURRENT_USER.id, payload);
  if(updateResult.error){
    alert(updateResult.error.message || "Profile update failed");
    return;
  }

  if(!updateResult.data || updateResult.data.length === 0){
    const insertResult = await insertUsersProfileRow(
      CURRENT_USER.id,
      updateResult.payload || payload
    );
    if(insertResult.error){
      alert(insertResult.error.message || "Profile update failed");
      return;
    }
  }

  alert("Profile updated successfully");
  location.href = "account.html";
};

loadProfile();
</script>

</body>
</html>
