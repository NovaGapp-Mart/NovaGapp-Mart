<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NovaGapp Pro - Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="public-config.js"></script>
  <script src="global.js"></script>
  <script>
    window.supa = window.supa || window.novaCreateSupabaseClient();
  </script>
    <style>
    :root{
      --nova-orange:#ff6a00;
      --nova-gradient:linear-gradient(90deg,#ff6a00 0%,#ee0979 100%);
      --chat-shell-max:100%;
      --chat-shell-gutter:0px;
      --chat-shell-border:transparent;
      --chat-shell-radius:0px;
      --chat-shell-shadow:none;
      --chat-pad:10px;
      --bubble-max:94%;
      --incoming-gap:20px;
      --incoming-bottom:78px;
      --name-max:100%;
    }
    *{box-sizing:border-box}
    html,body{width:100%;max-width:100%;height:100%;min-height:100dvh;overflow:hidden;margin:0}
    body{
      font-family:sans-serif;
      min-height:100dvh;
      display:flex;
      justify-content:center;
      align-items:stretch;
      overflow:hidden;
      background:#efeae2;
      user-select:none;
      padding-top:env(safe-area-inset-top,0px);
    }
    header,footer{width:100%;max-width:100%;flex-shrink:0}
    .chat-shell{
      position:relative;
      width:min(var(--chat-shell-max), calc(100% - var(--chat-shell-gutter) - var(--chat-shell-gutter)));
      height:100dvh;
      max-height:100dvh;
      display:flex;
      flex-direction:column;
      margin:0 auto;
      border:1px solid var(--chat-shell-border);
      border-radius:var(--chat-shell-radius);
      box-shadow:var(--chat-shell-shadow);
      background:#efeae2;
      overflow:hidden;
    }
    .chat-bg{background-image:url("https://www.transparenttextures.com/patterns/cubes.png");flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:var(--chat-pad);display:flex;flex-direction:column}
    #msgHolder{width:100%;min-width:0}
    .chat-head-left{min-width:0;flex:1 1 auto;display:flex;align-items:center;gap:8px;overflow:hidden}
    .chat-head-meta{min-width:0;max-width:100%;display:block;flex:1 1 auto;overflow:hidden}
    #userAvatar,#infoPic{display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;background-color:rgba(255,255,255,.22);color:#fff;font-weight:700;visibility:visible;opacity:1}
    #userName,#userMeta{max-width:var(--name-max);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;visibility:visible;opacity:1}
    .chat-head-actions{flex-shrink:0}
    .composer-row{min-width:0}
    .composer-row label,#sendBtn{flex-shrink:0}
    .bubble{max-width:var(--bubble-max);padding:8px;border-radius:8px;margin-bottom:10px;box-shadow:0 1px .5px rgba(0,0,0,.13);font-size:14.5px}
    .bubble,.msg-text{word-break:break-word;overflow-wrap:anywhere;white-space:pre-wrap}
    .bubble-out{background:#ffe9d6;align-self:flex-end;border-top-right-radius:0}
    .bubble-in{background:#fff;align-self:flex-start;border-top-left-radius:0}
    .msg-link{color:#0f6edb;text-decoration:underline;word-break:break-all}
    .reel-link-card{display:flex;flex-direction:column;gap:2px;margin-top:2px;padding:8px 10px;border-radius:10px;border:1px solid #ffd1b1;background:#fff7f1;text-decoration:none;color:#2b1800;max-width:min(300px,100%)}
    .reel-link-card-label{font-size:10px;font-weight:700;color:#ff6a00;text-transform:uppercase;letter-spacing:.04em}
    .reel-link-card-title{font-size:13px;font-weight:700;line-height:1.3}
    .reel-link-card-url{font-size:11px;color:#7f4d24;word-break:break-all}
    .msg-mini-avatar{width:22px;height:22px;border-radius:999px;background:#ffd5b5;background-size:cover;background-position:center;font-size:10px;font-weight:700;color:#7b3f00;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
    #profileOverlay{position:fixed;inset:0;background:#fff;z-index:20000;display:none;flex-direction:column;overflow-y:auto}
    .call-btn{width:34px;height:34px;border-radius:999px;border:1px solid rgba(255,255,255,.55);color:#fff;display:inline-flex;align-items:center;justify-content:center}
    .call-btn svg{width:17px;height:17px}
    .header-menu{position:absolute;top:64px;right:8px;z-index:14000;background:#fff;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.2);display:none;overflow:hidden;min-width:180px}
    .header-menu button{width:100%;text-align:left;padding:10px 12px;font-size:13px;border:none;background:#fff}
    .header-menu button+button{border-top:1px solid #eee}
    .filter-banner{display:none;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;background:#fff7d6;border-bottom:1px solid #f0df9f;font-size:12px}
    .filter-banner.show{display:flex}
    .reply-preview{display:none;align-items:center;justify-content:space-between;gap:10px;margin:0 10px 6px;background:#fff1e6;border-left:4px solid #ff6a00;border-radius:8px;padding:7px 9px}
    .reply-preview.show{display:flex}
    .reply-preview-text{font-size:12px;color:#6f3a00;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .reply-preview button{border:none;background:none;color:#666;font-size:16px}
    .message-context-menu{position:fixed;z-index:15000;background:#fff;border-radius:10px;box-shadow:0 10px 30px rgba(0,0,0,.25);display:none;overflow:hidden;min-width:170px}
    .message-context-menu button{display:block;width:100%;text-align:left;border:none;background:#fff;padding:10px 12px;font-size:13px}
    .message-context-menu button+button{border-top:1px solid #eee}
    .delete-modal{position:fixed;inset:0;z-index:16000;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;padding:16px}
    .delete-card{background:#fff;border-radius:12px;max-width:320px;width:100%;overflow:hidden}
    .delete-card h3{font-size:15px;font-weight:700;padding:12px}
    .delete-card button{display:block;width:100%;border:none;padding:11px 12px;text-align:left;background:#fff;font-size:13px}
    .delete-card button+button{border-top:1px solid #eee}
    .attachment{margin-top:6px;border-radius:8px;overflow:hidden}
    .attachment img,.attachment video{max-width:220px;max-height:280px;display:block}
    .attachment-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:4px;max-width:240px}
    .attachment-tile{position:relative;border:none;padding:0;margin:0;background:#111;border-radius:8px;overflow:hidden;cursor:pointer}
    .attachment-tile img,.attachment-tile video{width:100%;height:118px;max-width:none;max-height:none;object-fit:cover;display:block}
    .attachment-more{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.55);color:#fff;font-weight:700;font-size:20px}
    .star-tag{font-size:10px;color:#ad7a00;font-weight:700}
    .starred-bubble{box-shadow:0 0 0 2px #ffd45c inset}
    .msg-tick{font-size:11px;line-height:1;color:#8f96a3;letter-spacing:-1px;font-weight:700}
    .msg-tick-read{color:#22a7f0}
    .blocked-banner{display:none;padding:8px 10px;background:#2c0e0e;color:#ffd3d3;font-size:12px;text-align:center}
    .blocked-banner.show{display:block}
    .incoming-call-bar{position:fixed;left:50%;transform:translateX(-50%);width:min(calc(100% - var(--incoming-gap)), calc(var(--chat-shell-max) - 20px));bottom:var(--incoming-bottom);z-index:10500;background:#13151a;color:#fff;border-radius:12px;border:1px solid rgba(255,255,255,.15);padding:10px;display:none;align-items:center;justify-content:space-between;gap:10px}
    .incoming-call-actions{display:flex;gap:8px}
    .incoming-call-actions button{border:none;border-radius:8px;padding:7px 10px;font-size:12px;font-weight:700}
    .incoming-answer{background:#1aa34a;color:#fff}
    .incoming-decline{background:#e53935;color:#fff}
    .call-overlay{position:fixed;inset:0;z-index:12000;background:rgba(0,0,0,.9);display:none;align-items:center;justify-content:center;padding:14px}
    .call-card{width:min(96vw,460px);height:min(88vh,620px);background:#101319;border:1px solid rgba(255,255,255,.14);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;color:#fff}
    .call-head{padding:12px;border-bottom:1px solid rgba(255,255,255,.12);text-align:center}
    .call-stage{flex:1;position:relative;background:#06080c}
    .call-remote{width:100%;height:100%;object-fit:cover;background:#06080c}
    .call-local{width:128px;height:172px;object-fit:cover;border:2px solid rgba(255,255,255,.45);border-radius:12px;position:absolute;right:10px;bottom:10px;background:#1a1f28}
    .call-audio-mask{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-size:16px;color:#d5dbe5;text-align:center;padding:16px}
    .call-actions{display:flex;justify-content:center;gap:10px;padding:12px;border-top:1px solid rgba(255,255,255,.12);background:#0d1117}
    .call-actions button{border:none;border-radius:999px;padding:9px 14px;font-size:12px;font-weight:700}
    .call-mute,.call-cam{background:#2a3140;color:#fff}
    .call-end{background:#e53935;color:#fff}
    .media-preview-modal{position:fixed;inset:0;z-index:17000;background:rgba(0,0,0,.95);display:none;flex-direction:column;padding:0}
    .media-preview-head{height:58px;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;color:#fff;background:rgba(0,0,0,.55);width:100%}
    .media-preview-head button{border:none;border-radius:8px;padding:7px 11px;font-size:13px;font-weight:700}
    .media-preview-close{background:rgba(255,255,255,.18);color:#fff}
    .media-preview-download{background:#ff6a00;color:#fff}
    .media-preview-body{flex:1;display:flex;align-items:center;justify-content:center;padding:12px;width:100%}
    .media-preview-body img,.media-preview-body video{max-width:100%;max-height:100%;border-radius:8px;width:auto;height:auto;object-fit:contain}
    .info-tabs-wrap{padding:0 14px 14px}
    .info-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px}
    .info-tab{border:1px solid #ffd3b4;background:#fff7f1;color:#8d4d10;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:700;white-space:nowrap}
    .info-tab.active{background:#ff6a00;color:#fff;border-color:#ff6a00}
    .info-panel{display:none}
    .info-panel.show{display:block}
    .info-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
    .info-media-tile{width:88px;height:88px;flex:0 0 auto;border:none;border-radius:10px;background:#f4f4f4;overflow:hidden;position:relative;padding:0}
    .info-media-tile img,.info-media-tile video{width:100%;height:100%;object-fit:cover;display:block}
    .info-media-video-badge{position:absolute;right:6px;bottom:6px;background:rgba(0,0,0,.62);color:#fff;border-radius:999px;padding:2px 6px;font-size:10px;font-weight:700}
    .info-chat-chip{flex:0 0 auto;min-width:140px;max-width:230px;border:1px solid #ffd3b4;background:#fff7f1;border-radius:10px;padding:8px 10px;color:#603100;font-size:12px;line-height:1.35;word-break:break-word}
    .info-empty{width:100%;border:1px dashed #e6c4a8;border-radius:10px;padding:10px 12px;font-size:12px;color:#7d5b43;background:#fff}
    footer{padding-bottom:calc(8px + env(safe-area-inset-bottom,0px))}
    #mainInput{min-width:0;width:100%}

    @media (max-width:640px){
      .chat-bg{padding:10px}
      .bubble{font-size:14px}
      .attachment-grid{max-width:100%}
      .attachment-tile img,.attachment-tile video{height:108px}
      .info-media-tile{width:76px;height:76px}
      .info-chat-chip{min-width:130px;max-width:200px}
      footer{padding:8px calc(8px + env(safe-area-inset-right,0px)) calc(8px + env(safe-area-inset-bottom,0px)) calc(8px + env(safe-area-inset-left,0px))}
      .call-btn{width:32px;height:32px}
      .incoming-call-bar{width:calc(100% - 20px)}
      #userAvatar{width:40px;height:40px;min-width:40px;min-height:40px}
      .chat-head-left{max-width:calc(100% - 116px)}
      #userName{font-size:14px}
      #userMeta{font-size:10px}
      .composer-row{gap:6px}
      #sendBtn{width:42px;height:42px}
    }

    @media (min-width:641px) and (max-width:991px){
      :root{
        --chat-pad:15px;
        --bubble-max:84%;
        --incoming-gap:24px;
        --incoming-bottom:84px;
        --name-max:300px;
      }
      body{background:#edf0f4}
      .chat-shell{border-left:1px solid #e4e8ef;border-right:1px solid #e4e8ef}
      .incoming-call-bar{width:min(calc(100% - 24px), calc(100% - 24px))}
      .attachment img,.attachment video{max-width:240px;max-height:300px}
      .attachment-grid{max-width:250px}
      .info-media-tile{width:84px;height:84px}
      footer{padding:9px 10px calc(8px + env(safe-area-inset-bottom,0px))}
    }

    @media (min-width:992px) and (max-width:1279px){
      :root{
        --chat-shell-max:1120px;
        --chat-shell-gutter:14px;
        --chat-shell-border:#dde4ee;
        --chat-shell-radius:14px;
        --chat-shell-shadow:0 18px 40px rgba(15,23,42,.12);
        --chat-pad:18px;
        --bubble-max:78%;
        --incoming-gap:28px;
        --incoming-bottom:88px;
        --name-max:420px;
      }
      body{background:linear-gradient(180deg,#edf1f7 0%,#e5e9f0 100%)}
      .chat-shell{height:calc(100dvh - 28px);max-height:calc(100dvh - 28px);margin:14px auto}
      .chat-shell>header{border-top-left-radius:calc(var(--chat-shell-radius) - 1px);border-top-right-radius:calc(var(--chat-shell-radius) - 1px)}
      .chat-shell>footer{border-bottom-left-radius:calc(var(--chat-shell-radius) - 1px);border-bottom-right-radius:calc(var(--chat-shell-radius) - 1px)}
      .bubble{font-size:15px}
      .incoming-call-bar{width:min(calc(100% - 28px), calc(1120px - 28px))}
      .attachment img,.attachment video{max-width:260px;max-height:320px}
      .attachment-grid{max-width:280px}
      .info-media-tile{width:94px;height:94px}
      .info-chat-chip{min-width:150px;max-width:240px}
            footer{padding:10px 12px calc(8px + env(safe-area-inset-bottom,0px))}
      #mainInput{font-size:15px}
      #sendBtn{width:44px;height:44px}
      .media-preview-head{width:min(100%,1120px);margin:0 auto;padding:12px 16px}
      .media-preview-body{padding:18px}
      .media-preview-body img,.media-preview-body video{max-width:min(90vw,1000px);max-height:calc(100dvh - 120px)}
    }

    @media (min-width:1280px){
      :root{
        --chat-shell-max:1280px;
        --chat-shell-gutter:20px;
        --chat-shell-border:#d6ddea;
        --chat-shell-radius:16px;
        --chat-shell-shadow:0 22px 48px rgba(15,23,42,.14);
        --chat-pad:22px;
        --bubble-max:72%;
        --incoming-gap:36px;
        --incoming-bottom:92px;
        --name-max:520px;
      }
      body{background:linear-gradient(180deg,#ebeff6 0%,#dde3ee 100%)}
      .chat-shell{height:calc(100dvh - 40px);max-height:calc(100dvh - 40px);margin:20px auto}
      .chat-shell>header{border-top-left-radius:calc(var(--chat-shell-radius) - 1px);border-top-right-radius:calc(var(--chat-shell-radius) - 1px)}
      .chat-shell>footer{border-bottom-left-radius:calc(var(--chat-shell-radius) - 1px);border-bottom-right-radius:calc(var(--chat-shell-radius) - 1px)}
      .bubble{font-size:15.5px}
      .incoming-call-bar{width:min(calc(100% - 36px), calc(1280px - 36px))}
      .attachment img,.attachment video{max-width:280px;max-height:340px}
      .attachment-grid{max-width:300px}
      .info-media-tile{width:100px;height:100px}
      .info-chat-chip{min-width:160px;max-width:260px}
      footer{padding:12px 14px calc(10px + env(safe-area-inset-bottom,0px))}
      #mainInput{font-size:15px}
      #sendBtn{width:46px;height:46px}
      .call-btn{width:36px;height:36px}
      .media-preview-head{width:min(100%,1280px);padding:14px 20px}
      .media-preview-body{padding:22px}
      .media-preview-body img,.media-preview-body video{max-width:min(88vw,1200px);max-height:calc(100dvh - 128px)}
    }

    .hidden{display:none!important}
  </style>
</head>
<body>
  <div id="profileOverlay">
    <header class="p-4 flex items-center gap-4 border-b">
      <button onclick="closeProfile()" class="text-2xl"><-</button>
      <h1 class="font-bold text-lg">Contact Info</h1>
    </header>
    <div class="flex flex-col items-center p-6 bg-gray-50 text-center">
      <div id="infoPic" class="w-32 h-32 rounded-full bg-orange-200 border-4 border-white shadow-md bg-cover bg-center mb-4"></div>
      <h2 id="infoName" class="text-2xl font-bold text-gray-800"></h2>
      <p id="infoMeta" class="text-gray-500 italic text-sm">Real-time verified account</p>
    </div>
    <div class="p-4">
      <button onclick="confirmAction()" class="w-full p-4 text-left bg-gray-100 text-gray-700 font-semibold rounded-lg">Clear chat history</button>
    </div>
    <div class="info-tabs-wrap">
      <div class="info-tabs">
        <button id="infoTabMedia" class="info-tab active" type="button" onclick="switchInfoTab('media')">Media</button>
        <button id="infoTabChatting" class="info-tab" type="button" onclick="switchInfoTab('chatting')">Chatting</button>
      </div>
      <div id="infoMediaPanel" class="info-panel show">
        <div id="infoMediaStrip" class="info-strip"></div>
      </div>
      <div id="infoChattingPanel" class="info-panel">
        <div id="infoChattingStrip" class="info-strip"></div>
      </div>
    </div>
    <div id="groupMembersSection" class="p-4 border-t hidden">
      <h3 class="font-bold text-gray-800 mb-2">Group Members</h3>
      <div id="groupMembersList" class="space-y-2"></div>
    </div>
  </div>

  <div class="chat-shell">
  <header class="h-16 flex items-center px-2 justify-between shrink-0 shadow-lg z-50" style="background:var(--nova-gradient)">
    <div class="chat-head-left flex items-center gap-1 cursor-pointer" onclick="openProfile()">
      <button type="button" onclick="handleBackNavigation(event)" class="text-white p-2 text-2xl"><-</button>
      <div id="userAvatar" class="w-10 h-10 rounded-full bg-cover bg-center"></div>
      <div class="chat-head-meta text-white ml-2">
        <h1 id="userName" class="font-bold">Loading...</h1>
        <p id="userMeta" class="text-[11px] opacity-90"></p>
      </div>
    </div>
    <div class="chat-head-actions flex items-center gap-2 pr-1">
      <button id="audioCallBtn" class="call-btn" onclick="event.stopPropagation();startOutgoingCall('audio')" title="Audio Call">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.12 4.2 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.78.61 2.62a2 2 0 0 1-.45 2.11L8 9.99a16 16 0 0 0 6 6l1.54-1.27a2 2 0 0 1 2.11-.45c.84.28 1.72.49 2.62.61A2 2 0 0 1 22 16.92z"/></svg>
      </button>
      <button id="videoCallBtn" class="call-btn" onclick="event.stopPropagation();startOutgoingCall('video')" title="Video Call">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="14" height="10" rx="2"></rect><path d="M16 10l6-3v10l-6-3z"></path></svg>
      </button>
      <button id="chatMenuBtn" class="call-btn" onclick="event.stopPropagation();toggleHeaderMenu()" title="Menu">
        <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"></circle><circle cx="12" cy="12" r="2"></circle><circle cx="12" cy="19" r="2"></circle></svg>
      </button>
    </div>
  </header>

  <div id="chatHeaderMenu" class="header-menu">
    <button type="button" onclick="showStarredMessages()">Starred Messages</button>
    <button type="button" onclick="clearAllChat()">Clear All Chat</button>
    <button type="button" onclick="blockCurrentUser()">Block User</button>
    <button type="button" onclick="openProfile()">Info</button>
  </div>

  <div id="blockedBanner" class="blocked-banner">You blocked this user. Messaging and calls are disabled.</div>
  <div id="filterBanner" class="filter-banner">
    <span id="filterBannerText">Showing starred messages</span>
    <button type="button" class="text-orange-700 font-semibold" onclick="showAllMessages()">Show All</button>
  </div>

  <div id="chatWindow" class="chat-bg"><div id="msgHolder" class="flex flex-col"></div></div>

  <footer class="bg-white p-2 border-t z-[60]">
    <div id="replyPreview" class="reply-preview">
      <div class="reply-preview-text" id="replyPreviewText"></div>
      <button type="button" onclick="cancelReply()">x</button>
    </div>
    <div class="composer-row flex items-center gap-2 mt-1">
      <label class="p-2 cursor-pointer text-gray-500">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
        <input type="file" id="fileIn" class="hidden" accept="image/*,video/*" multiple onchange="handleMediaUpload(this)">
      </label>
      <input id="mainInput" type="text" placeholder="Type a message" class="flex-1 bg-gray-100 rounded-full px-4 py-2 outline-none text-sm">
      <button id="sendBtn" onclick="sendMessage()" class="w-11 h-11 rounded-full flex items-center justify-center text-white bg-orange-600">></button>
    </div>
  </footer>
  </div>

  <div id="incomingCallBar" class="incoming-call-bar">
    <div id="incomingCallText" class="text-sm font-semibold truncate">Incoming call</div>
    <div class="incoming-call-actions">
      <button type="button" class="incoming-answer" onclick="answerIncomingCall()">Answer</button>
      <button type="button" class="incoming-decline" onclick="declineIncomingCall()">Decline</button>
    </div>
  </div>

  <div id="callOverlay" class="call-overlay">
    <div class="call-card">
      <div class="call-head">
        <div id="callTitle" class="text-[15px] font-bold">Call</div>
        <div id="callSub" class="text-xs text-gray-300 mt-1">Connecting...</div>
      </div>
      <div class="call-stage">
        <video id="remoteVideo" class="call-remote" autoplay playsinline></video>
        <video id="localVideo" class="call-local" autoplay muted playsinline></video>
        <div id="callAudioMask" class="call-audio-mask">Audio call in progress</div>
      </div>
      <div class="call-actions">
        <button id="muteCallBtn" type="button" class="call-mute" onclick="toggleMute()">Mute</button>
        <button id="cameraCallBtn" type="button" class="call-cam" onclick="toggleCamera()">Camera Off</button>
        <button type="button" class="call-end" onclick="hangupActiveCall()">End</button>
      </div>
    </div>
  </div>

  <div id="messageContextMenu" class="message-context-menu">
    <button type="button" onclick="contextMenuStar()">Star</button>
    <button type="button" onclick="contextMenuReply()">Reply</button>
    <button type="button" onclick="contextMenuDelete()">Delete</button>
  </div>

  <div id="deleteChoiceModal" class="delete-modal">
    <div class="delete-card">
      <h3>Delete message</h3>
      <button type="button" onclick="deleteForMe()">Delete for me</button>
      <button type="button" onclick="deleteForEveryone()">Delete for everyone</button>
      <button type="button" onclick="closeDeleteChoice()">Cancel</button>
    </div>
  </div>

  <div id="mediaPreviewModal" class="media-preview-modal">
    <div class="media-preview-head">
      <button type="button" class="media-preview-close" onclick="closeMediaPreview()">Close</button>
      <button type="button" id="mediaPreviewDownloadBtn" class="media-preview-download" onclick="downloadPreviewMedia()">Download</button>
    </div>
    <div class="media-preview-body" id="mediaPreviewBody">
      <img id="mediaPreviewImage" class="hidden" alt="preview">
      <video id="mediaPreviewVideo" class="hidden" controls playsinline></video>
    </div>
  </div>

  <script src="open-chat.js"></script>
</body>
</html>
