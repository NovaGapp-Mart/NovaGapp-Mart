<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NovaGapp Pro - Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="public-config.js"></script>
    <script src="global.js"></script>
    <script>
        window.supa = window.supa || window.novaCreateSupabaseClient();
    </script>

    <style>
        :root { --nova-orange: #ff6a00; --nova-gradient: linear-gradient(90deg, #ff6a00 0%, #ee0979 100%); }
        body { font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #efeae2; user-select: none; }
        .chat-bg { background-image: url("https://www.transparenttextures.com/patterns/cubes.png"); flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .bubble { position: relative; max-width: 85%; padding: 8px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); font-size: 14.5px; transition: background 0.2s; -webkit-tap-highlight-color: transparent; cursor: pointer; }
        .bubble-out { background: #ffe9d6; align-self: flex-end; border-top-right-radius: 0; }
        .bubble-in { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .starred { border: 2px solid #ffd700 !important; }
        .group-tag { background: #ff6a00; color: white; font-size: 10px; padding: 2px 8px; border-radius: 4px; font-weight: bold; text-transform: uppercase; display: none; }
        #profileOverlay { position: fixed; inset: 0; background: white; z-index: 20000; display: none; flex-direction: column; overflow-y: auto; }
        .media-scroll { display: flex; overflow-x: auto; gap: 10px; padding: 10px; scrollbar-width: none; }
        .media-thumb { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: #eee; }
        #fullViewOverlay { position: fixed; inset: 0; background: black; z-index: 10000; display: none; flex-direction: column; }
        .media-actions { position: absolute; top: 0; width: 100%; padding: 20px; display: flex; justify-content: space-between; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); color: white; z-index: 10001; }
        #contextMenu { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 11000; display: none; align-items: center; justify-content: center; }
        .menu-card { background: white; width: 260px; border-radius: 12px; overflow: hidden; }
        .menu-item { padding: 14px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #eee; font-weight: 500; }
        #replyPreview { display: none; background: #eee; border-left: 4px solid var(--nova-orange); padding: 5px 10px; margin: 0 10px; border-radius: 4px; }
        .admin-icon { font-size: 12px; color: #ff6a00; border: 1px solid #ff6a00; padding: 1px 4px; border-radius: 3px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="profileOverlay">
        <header class="p-4 flex items-center gap-4 border-b">
            <button onclick="closeProfile()" class="text-2xl">←</button>
            <h1 class="font-bold text-lg">Contact Info</h1>
        </header>
        <div class="flex flex-col items-center p-6 bg-gray-50 text-center">
            <div id="infoPic" class="w-32 h-32 rounded-full bg-orange-200 border-4 border-white shadow-md bg-cover bg-center mb-4"></div>
            <div class="flex items-center gap-2">
                <h2 id="infoName" class="text-2xl font-bold text-gray-800"></h2>
                <span id="infoGroupBadge" class="group-tag">GROUP</span>
            </div>
            <p id="infoSlogan" class="text-gray-500 italic text-sm">Real-time Verified Account</p>
        </div>
        
        <div id="memberSection" class="p-4 hidden border-t">
            <h3 class="font-bold text-gray-700 mb-2">Group Members</h3>
            <div id="memberList"></div>
        </div>

        <div class="p-4">
            <button onclick="confirmAction('Delete Chat')" class="w-full p-4 text-left bg-gray-100 text-gray-700 font-semibold rounded-lg">🗑️ Clear Chat History</button>
        </div>
    </div>

    <header class="h-16 flex items-center px-2 justify-between shrink-0 shadow-lg z-50 cursor-pointer" style="background: var(--nova-gradient);" onclick="openProfile()">
        <div class="flex items-center gap-1">
            <button onclick="event.stopPropagation(); window.history.back()" class="text-white p-2 text-2xl">←</button>
            <div id="userAvatar" class="w-10 h-10 rounded-full bg-white bg-cover bg-center"></div>
            <div class="text-white ml-2">
                <div class="flex items-center gap-2">
                    <h1 id="userName" class="font-bold">Loading...</h1>
                    <span id="headerGroupBadge" class="group-tag">GROUP</span>
                </div>
            </div>
        </div>
    </header>

    <div id="chatWindow" class="chat-bg">
        <div id="msgHolder" class="flex flex-col"></div>
    </div>

    <footer id="chatFooter" class="bg-white p-2 border-t z-[60]">
        <div id="replyPreview">
            <span id="replyText" class="text-[10px] text-gray-500 block truncate"></span>
        </div>
        <div id="inputArea" class="flex items-center gap-2 mt-1">
            <label class="p-2 cursor-pointer text-gray-500">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                <input type="file" id="fileIn" class="hidden" accept="image/*,video/*" onchange="handleMediaUpload(this)">
            </label>
            <input id="mainInput" type="text" placeholder="Type a message" class="flex-1 bg-gray-100 rounded-full px-4 py-2 outline-none text-sm">
            <button id="sendBtn" onclick="sendMessage()" class="w-11 h-11 rounded-full flex items-center justify-center text-white bg-orange-600">➤</button>
        </div>
    </footer>

    <script>
        const supa = window.supa;
        const msgHolder = document.getElementById('msgHolder');
        const params = new URLSearchParams(window.location.search);
        
        const receiverId = params.get('id'); // Supabase User ID
        const receiverName = decodeURIComponent(params.get('name') || "User");
        const receiverPic = params.get('img') || "";
        
        // Hamari apni ID (Jo login ke waqt store hui thi)
        const myId = localStorage.getItem('user_id') || 'guest_user';

        window.onload = async () => {
            document.getElementById('userName').innerText = receiverName;
            if(receiverPic) document.getElementById('userAvatar').style.backgroundImage = `url('${receiverPic}')`;
            
            // 1. Purani chats load karo database se
            loadMessages();

            // 2. Real-time Subscription (Jaise hi koi msg bhejega, yahan dikhega)
            subscribeToMessages();
        };

        async function loadMessages() {
            msgHolder.innerHTML = "<p class='text-center text-xs text-gray-400'>Syncing messages...</p>";
            
            const { data, error } = await supa
                .from('messages')
                .select('*')
                .or(`and(sender_id.eq.${myId},receiver_id.eq.${receiverId}),and(sender_id.eq.${receiverId},receiver_id.eq.${myId})`)
                .order('created_at', { ascending: true });

            if(error) return console.error(error);

            msgHolder.innerHTML = "";
            data.forEach(msg => {
                const type = (msg.sender_id === myId) ? 'out' : 'in';
                addMsgToUI(msg.content, type, msg.created_at);
            });
            scrollBottom();
        }

        async function sendMessage() {
            const text = document.getElementById('mainInput').value.trim();
            if(!text) return;

            document.getElementById('mainInput').value = "";

            // Insert into Supabase
            const { error } = await supa.from('messages').insert([{
                sender_id: myId,
                receiver_id: receiverId,
                content: text
            }]);

            if(error) alert("Message failed to send");
        }

        function subscribeToMessages() {
            supa.channel('realtime_chats')
            .on('postgres_changes', { event: 'INSERT', table: 'messages' }, payload => {
                const newMsg = payload.new;
                // Check agar message hamare liye hai ya humne bheja hai
                if((newMsg.sender_id === myId && newMsg.receiver_id === receiverId) || 
                   (newMsg.sender_id === receiverId && newMsg.receiver_id === myId)) {
                    const type = (newMsg.sender_id === myId) ? 'out' : 'in';
                    addMsgToUI(newMsg.content, type, newMsg.created_at);
                    scrollBottom();
                }
            })
            .subscribe();
        }

        function addMsgToUI(content, type, time) {
            const div = document.createElement('div');
            div.className = `bubble bubble-${type}`;
            const date = new Date(time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            div.innerHTML = `<div>${content}</div><div class="text-[9px] text-gray-400 text-right mt-1">${date}</div>`;
            msgHolder.appendChild(div);
        }

        async function handleMediaUpload(el) {
            if (!el.files[0]) return;
            alert("Storage Bucket is being configured for NovaGapp Pro...");
            // Yahan Supabase Storage upload logic aayega
        }

        function openProfile() {
            document.getElementById('infoName').innerText = receiverName;
            document.getElementById('infoPic').style.backgroundImage = `url('${receiverPic}')`;
            document.getElementById('profileOverlay').style.display = 'flex';
        }

        function closeProfile() { document.getElementById('profileOverlay').style.display = 'none'; }
        function scrollBottom() { document.getElementById('chatWindow').scrollTop = 999999; }
        function confirmAction() { if(confirm("Clear history?")) msgHolder.innerHTML = ""; }

    </script>
</body>
</html>
