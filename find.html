function escapeHtml(text){
  return String(text || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function withVideoPreviewTime(url){
  const src = String(url || "").trim();
  if(!src) return "";
  if(src.includes("#")) return src;
  return `${src}#t=0.1`;
}

function isPlaceholderName(value){
  const text = String(value || "").trim().toLowerCase();
  if(!text) return true;
  if(text === "user" || text === "u" || text === "guest" || text === "unknown" || text === "member" || text === "unique"){
    return true;
  }
  if(/^member[\s._-]*[a-z0-9]{4,}$/i.test(text)) return true;
  if(/^user[\s._-]*[a-z0-9]{4,}$/i.test(text)) return true;
  if(/^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(text)){
    return true;
  }
  return false;
}

function splitCompactToken(value){
  const token = String(value || "").toLowerCase().replace(/[^a-z]+/g, "");
  if(token.length < 9){
    return token ? [token] : [];
  }
  const mid = Math.floor(token.length / 2);
  const minSide = 3;
  let bestIdx = -1;
  let bestWeight = -Infinity;
  for(let i = minSide; i <= token.length - minSide; i += 1){
    const prev = token[i - 1];
    const next = token[i];
    const prevVowel = /[aeiou]/.test(prev);
    const nextVowel = /[aeiou]/.test(next);
    const dist = Math.abs(i - mid);
    let weight = 0;
    if(prevVowel && !nextVowel) weight += 4;
    if(!prevVowel && nextVowel) weight += 3;
    if(dist <= 1) weight += 3;
    else if(dist <= 2) weight += 2;
    else if(dist <= 4) weight += 1;
    if(i >= 4 && token.length - i >= 4) weight += 1;
    if(weight > bestWeight){
      bestWeight = weight;
      bestIdx = i;
    }
  }
  if(bestIdx <= 0){
    return [token];
  }
  const left = token.slice(0, bestIdx).trim();
  const right = token.slice(bestIdx).trim();
  if(!left || !right){
    return [token];
  }
  return [left, right];
}

function parseEmailLocalWords(emailLocal){
  const cleaned = String(emailLocal || "")
    .toLowerCase()
    .replace(/[^a-z0-9._-]+/g, " ")
    .replace(/[._-]+/g, " ")
    .replace(/\d+/g, " ")
    .replace(/\s+/g, " ")
    .trim();
  if(!cleaned){
    return "";
  }
  const out = [];
  cleaned.split(/\s+/).forEach(piece => {
    splitCompactToken(piece).forEach(token => {
      const next = String(token || "").trim();
      if(next) out.push(next);
    });
  });
  return out.join(" ").trim().slice(0, 80);
}

function toTitleWords(text){
  return String(text || "")
    .split(/\s+/)
    .map(part => {
      const token = String(part || "").trim();
      if(!token) return "";
      return token.slice(0, 1).toUpperCase() + token.slice(1).toLowerCase();
    })
    .filter(Boolean)
    .join(" ")
    .slice(0, 64);
}

function safeDisplayName(user){
  const direct = String(user?.display_name || user?.full_name || user?.name || user?.user_name || user?.username || "").trim();
  if(direct && !isPlaceholderName(direct)){
    return toTitleWords(direct) || direct;
  }
  const email = String(user?.email || "").trim().toLowerCase();
  const local = String(email.split("@")[0] || "").trim();
  const parsed = parseEmailLocalWords(local);
  if(parsed){
    return toTitleWords(parsed) || parsed;
  }
  return "Member";
}

function tokenized(text){
  const source = String(text || "").toLowerCase();
  try{
    const unicodeRegex = new RegExp("[^\\p{L}\\p{N}@._ -]", "gu");
    return source
      .normalize("NFKD")
      .replace(unicodeRegex, " ")
      .split(/[\s@._-]+/)
      .map(s => s.trim())
      .filter(Boolean);
  }catch(_){
    return source
      .replace(/[^a-z0-9@._ -]/g, " ")
      .split(/[\s@._-]+/)
      .map(s => s.trim())
      .filter(Boolean);
  }
}

function normalizeUserRow(raw){
  const row = raw && typeof raw === "object" ? raw : {};
  return {
    user_id: String(row.user_id || row.id || row.uid || "").trim(),
    display_name: String(row.display_name || row.full_name || row.name || row.user_name || row.username || "").trim(),
    username: String(row.username || row.user_name || "").trim(),
    photo: String(row.photo || row.avatar_url || row.profile_icon || row.user_icon || "").trim(),
    email: String(row.email || "").trim().toLowerCase(),
    verified: !!row.verified,
    trust_score: Math.max(0, Number(row.trust_score || 0)),
    search_boost: Math.max(0, Number(row.search_boost || 0)),
    followers_count: Math.max(0, Number(row.followers_count || 0))
  };
}

function mergeUniqueUsers(){
  const merged = new Map();
  Array.from(arguments).forEach(list => {
    (Array.isArray(list) ? list : []).forEach(entry => {
      const row = normalizeUserRow(entry);
      const id = row.user_id;
      if(!id) return;
      const prev = merged.get(id);
      if(!prev){
        merged.set(id, row);
        return;
      }
      merged.set(id, {
        user_id: id,
        display_name: prev.display_name || row.display_name,
        username: prev.username || row.username,
        photo: prev.photo || row.photo,
        email: prev.email || row.email,
        verified: !!(prev.verified || row.verified),
        trust_score: Math.max(0, Number(prev.trust_score || 0), Number(row.trust_score || 0)),
        search_boost: Math.max(0, Number(prev.search_boost || 0), Number(row.search_boost || 0)),
        followers_count: Math.max(0, Number(prev.followers_count || 0), Number(row.followers_count || 0))
      });
    });
  });
  return Array.from(merged.values());
}

function scoreUser(user, tokens){
  if(!tokens.length) return 1 + Math.max(0, Number(user?.search_boost || 0));
  const hay = [
    safeDisplayName(user),
    user?.username || "",
    user?.email || ""
  ].join(" ").toLowerCase();
  let score = 0;
  tokens.forEach((token, idx) => {
    if(!token) return;
    if(hay.includes(token)) score += 100 - idx;
    if(hay.startsWith(token)) score += 120 - idx;
  });
  score += Math.max(0, Number(user?.search_boost || 0));
  return score;
}

function buildApiBases(){
  const out = [];
  const push = (raw) => {
    const value = String(raw || "").trim().replace(/\/+$/g, "");
    if(!value) return;
    if(!/^https?:\/\//i.test(value)) return;
    if(!out.includes(value)) out.push(value);
  };
  try{
    push(window.CONTEST_API_BASE);
    push(window.API_BASE);
    push(localStorage.getItem("contest_api_base"));
    push(localStorage.getItem("api_base"));
    push(sessionStorage.getItem("contest_api_base"));
    push(sessionStorage.getItem("api_base"));
  }catch(_){ }
  if(/^https?:\/\//i.test(location.origin || "")) push(location.origin);
  push("https://novagapp-mart.onrender.com");
  return out;
}

function canUseDirectUsersTable(){
  const raw = String(window.NOVA_USE_DIRECT_USERS_TABLE || window.NOVA_ENABLE_DIRECT_USERS_TABLE || "").trim().toLowerCase();
  if(!raw) return true;
  return raw === "1" || raw === "true" || raw === "yes" || raw === "on";
}

async function fetchProfilesFromApi(){
  return [];
}

async function trackAutomationStep(step, meta){
  if(!supa) return;
  try{
    const { data } = await supa.auth.getSession();
    const userId = data?.session?.user?.id || "";
    if(!userId) return;
    const payload = {
      user_id: userId,
      step: String(step || "").trim().toLowerCase(),
      meta: meta && typeof meta === "object" ? meta : {}
    };
    const bases = [""].concat(buildApiBases());
    for(const base of bases){
      try{
        const res = await fetch(`${base}/api/automation/track`, {
          method: "POST",
          headers: { "Content-Type":"application/json" },
          body: JSON.stringify(payload)
        });
        if(res.ok) break;
      }catch(_){ }
    }
  }catch(_){ }
}

async function ensureSession(){
  if(!supa) supa = window.NOVA && window.NOVA.supa;
  if(!supa){
    alert("Please refresh and try again.");
    throw new Error("supabase_unavailable");
  }
  const { data } = await supa.auth.getSession();
  if(!data.session){
    location.href = "login.html";
    throw new Error("login_required");
  }
  return data.session.user;
}

async function fetchUsersFromDiscoverApi(q){
  const query = String(q || "").trim();
  const clean = query.replace(/[%*,()]/g, " ").replace(/["']/g, " ").replace(/\s+/g, " ").trim().slice(0, 80);
  const perPage = clean ? 160 : 220;
  const maxPages = clean ? 3 : 4;
  const bases = [""].concat(buildApiBases());

  for(const base of bases){
    const out = [];
    const seen = new Set();
    let worked = false;
    for(let page = 1; page <= maxPages; page += 1){
      const params = new URLSearchParams();
      if(clean) params.set("q", clean);
      params.set("limit", String(perPage));
      params.set("page", String(page));
      const root = String(base || "").trim().replace(/\/+$/g, "");
      const endpoint = root ? `${root}/api/users/discover?${params.toString()}` : `/api/users/discover?${params.toString()}`;
      try{
        const res = await fetch(endpoint, { cache: "no-store" });
        if(!res.ok) break;
        worked = true;
        const rows = await res.json().catch(() => []);
        if(!Array.isArray(rows) || !rows.length) break;
        rows.forEach(row => {
          const mapped = normalizeUserRow(row);
          if(!mapped.user_id || seen.has(mapped.user_id)) return;
          seen.add(mapped.user_id);
          out.push(mapped);
        });
        if(rows.length < perPage) break;
      }catch(_){
        break;
      }
    }
    if(worked && out.length) return out;
  }
  return [];
}

function isMissingColumnError(error){
  const text = `${error?.message || ""} ${error?.details || ""} ${error?.hint || ""}`.toLowerCase();
  if(!text) return false;
  return text.includes("column") && text.includes("does not exist");
}

function buildUserSearchFilters(clean){
  const value = String(clean || "").replace(/[,%()]/g, " ").replace(/\s+/g, " ").trim();
  if(!value) return [""];
  return [
    `username.ilike.%${value}%,user_name.ilike.%${value}%,full_name.ilike.%${value}%,display_name.ilike.%${value}%,name.ilike.%${value}%,email.ilike.%${value}%`,
    `username.ilike.%${value}%,user_name.ilike.%${value}%,full_name.ilike.%${value}%,display_name.ilike.%${value}%,name.ilike.%${value}%`,
    `username.ilike.%${value}%,full_name.ilike.%${value}%,display_name.ilike.%${value}%,name.ilike.%${value}%`,
    `username.ilike.%${value}%,name.ilike.%${value}%`,
    `username.ilike.%${value}%`
  ];
}

async function runUsersQuery(selectCols, clean, limit){
  if(!supa || !canUseDirectUsersTable()){
    return { data: [], error: null };
  }
  const filters = buildUserSearchFilters(clean);
  let lastError = null;
  for(const filter of filters){
    let request = supa.from("users").select(selectCols).limit(limit);
    if(filter){
      request = request.or(filter);
    }
    const { data, error } = await request;
    if(!error){
      return { data: Array.isArray(data) ? data : [], error: null };
    }
    lastError = error;
    const text = `${error?.message || ""} ${error?.details || ""} ${error?.hint || ""}`.toLowerCase();
    const usersRelationMissing = text.includes("users") && (text.includes("schema cache") || text.includes("does not exist") || text.includes("not found") || text.includes("relation"));
    if(usersRelationMissing){
      return { data: [], error: null };
    }
    if(!isMissingColumnError(error)){
      return { data: [], error: null };
    }
  }
  return { data: [], error: null };
}

async function fetchUsersFromApi(q){
  if(!supa || !canUseDirectUsersTable()) return [];
  const query = String(q || "").trim();
  const clean = query.replace(/[%*,()]/g, " ").replace(/["']/g, " ").replace(/\s+/g, " ").trim().slice(0, 80);
  const merged = [];
  const seen = new Set();
  const pushRows = (rows) => {
    (Array.isArray(rows) ? rows : []).forEach(row => {
      const id = String(row?.user_id || row?.id || row?.uid || "").trim();
      if(!id || seen.has(id)) return;
      seen.add(id);
      merged.push(row);
    });
  };

  const selectVariants = [
    "user_id,id,username,user_name,full_name,display_name,name,photo,avatar_url,profile_icon,user_icon,email",
    "id,user_id,username,user_name,full_name,display_name,name,avatar_url,photo,profile_icon,user_icon,email",
    "user_id,id,username,full_name,display_name,name,photo,avatar_url,email",
    "id,user_id,username,full_name,display_name,name,avatar_url,photo,email",
    "user_id,id,username,name,photo,avatar_url,profile_icon,user_icon,email",
    "id,user_id,username,name,avatar_url,photo,profile_icon,user_icon,email",
    "user_id,id,username,photo,avatar_url",
    "id,user_id,username,avatar_url,photo"
  ];

  for(const cols of selectVariants){
    const { data, error } = await runUsersQuery(cols, clean, 320);
    if(error){
      if(isMissingColumnError(error)) continue;
      if(!merged.length){
        console.error("Error fetching users:", error);
      }
      break;
    }
    pushRows(data);
    if(clean && merged.length >= 200) break;
  }

  if(clean && !merged.length){
    for(const cols of selectVariants){
      const { data, error } = await runUsersQuery(cols, "", 320);
      if(error){
        if(isMissingColumnError(error)) continue;
        break;
      }
      const rows = (Array.isArray(data) ? data : []).filter(row => {
        const hay = [
          row?.username || "",
          row?.user_name || "",
          row?.display_name || "",
          row?.full_name || "",
          row?.name || "",
          row?.email || ""
        ].join(" ").toLowerCase();
        return hay.includes(clean.toLowerCase());
      });
      pushRows(rows);
      if(merged.length >= 200) break;
    }
  }

  return merged;
}

async function fetchUsersFallback(q){
  if(!supa || !canUseDirectUsersTable()) return [];
  const query = String(q || "").trim();
  const clean = query.replace(/[%*,()]/g, " ").replace(/["']/g, " ").replace(/\s+/g, " ").trim().slice(0, 80);
  const variants = [
    "user_id,id,username,user_name,full_name,display_name,name,photo,avatar_url,profile_icon,user_icon,email",
    "id,user_id,username,user_name,full_name,display_name,name,avatar_url,photo,profile_icon,user_icon,email",
    "user_id,id,username,full_name,display_name,name,photo,avatar_url,email",
    "id,user_id,username,name,avatar_url,photo,email"
  ];
  const merged = [];
  const seen = new Set();
  const pushRows = (rows) => {
    (Array.isArray(rows) ? rows : []).forEach(row => {
      const id = String(row?.user_id || row?.id || row?.uid || "").trim();
      if(!id || seen.has(id)) return;
      seen.add(id);
      merged.push(row);
    });
  };

  for(const cols of variants){
    const { data, error } = await runUsersQuery(cols, clean, 320);
    if(error){
      if(isMissingColumnError(error)) continue;
      console.error("users fallback error", error);
      break;
    }
    pushRows(data);
    if(clean && merged.length >= 160) break;
  }

  return merged;
}

async function fetchUsers(q){
  const query = String(q || "").trim();
  const tokens = tokenized(query);
  const primaryResults = await Promise.allSettled([
    fetchUsersFromDiscoverApi(query),
    fetchUsersFromApi(query),
    fetchProfilesFromApi(query)
  ]);
  const discoverUsers = primaryResults[0].status === "fulfilled" ? primaryResults[0].value : [];
  const apiUsers = primaryResults[1].status === "fulfilled" ? primaryResults[1].value : [];
  const profileUsers = primaryResults[2].status === "fulfilled" ? primaryResults[2].value : [];

  let users = mergeUniqueUsers(discoverUsers, apiUsers, profileUsers);
  if(!users.length || (query && users.length < 16)){
    const fallbackResults = await Promise.allSettled([
      fetchUsersFallback(query),
      fetchProfilesFromApi(query)
    ]);
    const fallbackUsers = fallbackResults[0].status === "fulfilled" ? fallbackResults[0].value : [];
    const fallbackProfiles = fallbackResults[1].status === "fulfilled" ? fallbackResults[1].value : [];
    users = mergeUniqueUsers(users, fallbackUsers, fallbackProfiles);
  }

  if(query && !users.length){
    const fallbackAllResults = await Promise.allSettled([
      fetchUsersFromDiscoverApi(""),
      fetchUsersFromApi(""),
      fetchProfilesFromApi(""),
      fetchUsersFallback("")
    ]);
    const discoverAll = fallbackAllResults[0].status === "fulfilled" ? fallbackAllResults[0].value : [];
    const apiAll = fallbackAllResults[1].status === "fulfilled" ? fallbackAllResults[1].value : [];
    const profilesAll = fallbackAllResults[2].status === "fulfilled" ? fallbackAllResults[2].value : [];
    const fallbackAll = fallbackAllResults[3].status === "fulfilled" ? fallbackAllResults[3].value : [];
    users = mergeUniqueUsers(users, discoverAll, apiAll, profilesAll, fallbackAll);
  }

  let mapped = users
    .map(user => {
      const normalized = normalizeUserRow(user);
      return {
        ...normalized,
        display_name: safeDisplayName(normalized)
      };
    })
    .filter(user => user.user_id)
    .map(user => ({ ...user, score: scoreUser(user, tokens) }))
    .filter(user => tokens.length ? user.score > 0 : true)
    .sort((a, b) => b.score - a.score);

  if(query && !mapped.length && users.length){
    mapped = users
      .map(user => {
        const normalized = normalizeUserRow(user);
        return {
          ...normalized,
          display_name: safeDisplayName(normalized)
        };
      })
      .filter(user => user.user_id)
      .map(user => ({ ...user, score: scoreUser(user, tokens) }))
      .sort((a, b) => b.score - a.score);
  }

  return mapped;
}

async function fetchReels(q){
  if(!supa) return [];
  const query = String(q || "").trim();
  const clean = query.replace(/[%*,()]/g, "").trim();
  let request = supa
    .from("reels")
    .select("id,video_url,title,description,keywords,user_id")
    .order("created_at", { ascending:false })
    .limit(120);
  let { data, error } = await request;
  if(error){
    const msg = String(error?.message || "").toLowerCase();
    if(msg.includes("column") && msg.includes("keywords")){
      let fallback = supa
        .from("reels")
        .select("id,video_url,title,description,user_id")
        .order("created_at", { ascending:false })
        .limit(120);
      ({ data, error } = await fallback);
    }
  }
  if(error){
    console.error("reels fetch error", error);
    return [];
  }
  const rows = Array.isArray(data) ? data : [];
  if(!clean) return rows;
  const lowered = clean.toLowerCase();
  return rows.filter(row => {
    const hay = [
      row?.title || "",
      row?.description || "",
      Array.isArray(row?.keywords) ? row.keywords.join(" ") : (row?.keywords || "")
    ].join(" ").toLowerCase();
    return hay.includes(lowered);
  });
}

async function fetchPosts(q){
  if(!supa) return [];
  const query = String(q || "").trim();
  const clean = query.replace(/[%*,()]/g, "").trim();
  const plans = [
    "id,user_id,media_url,media_type,title,description,keywords,created_at",
    "id,user_id,media_url,media_type,title,description,created_at",
    "id,user_id,media_url,title,description,keywords,created_at",
    "id,user_id,media_url,title,description,created_at"
  ];
  for(const fields of plans){
    let request = supa
      .from("posts")
      .select(fields)
      .order("created_at", { ascending:false })
      .limit(120);
    if(clean){
      request = request.or(`title.ilike.%${clean}%,description.ilike.%${clean}%`);
    }
    const { data, error } = await request;
    if(error){
      continue;
    }
    const rows = Array.isArray(data) ? data : [];
    if(!clean) return rows;
    const lowered = clean.toLowerCase();
    return rows.filter(row => {
      const hay = [
        row?.title || "",
        row?.description || "",
        Array.isArray(row?.keywords) ? row.keywords.join(" ") : (row?.keywords || "")
      ].join(" ").toLowerCase();
      return hay.includes(lowered);
    });
  }
  return [];
}

function renderReelsSection(reels){
  const section = document.createElement("div");
  section.className = "section";
  section.dataset.section = "reels";
  section.innerHTML = `<div class="section-title">REELS</div>`;
  const wrap = document.createElement("div");
  if(!reels.length){
    wrap.innerHTML = "<p style='padding:0 12px 12px;color:#777'>No reels found</p>";
  }else{
    reels.forEach(r => {
      const row = document.createElement("div");
      row.className = "reel-item";
      row.innerHTML = `
        <video src="${escapeHtml(withVideoPreviewTime(r.video_url || ""))}" muted preload="metadata"></video>
        <div class="meta">
          <div><b>${escapeHtml(r.title || "Reel")}</b></div>
          <small>${escapeHtml(r.description || "")}</small>
        </div>
      `;
      row.onclick = () => {
        const url = new URL("reel.html", location.href);
        if(r?.user_id) url.searchParams.set("uid", String(r.user_id || ""));
        if(r?.id) url.searchParams.set("focus", String(r.id || ""));
        location.href = url.pathname + url.search;
      };
      wrap.appendChild(row);
    });
  }
  section.appendChild(wrap);
  return section;
}

function renderUserSection(users, tabKey, title){
  const section = document.createElement("div");
  section.className = "section";
  section.dataset.section = tabKey;
  section.innerHTML = `<div class="section-title">${escapeHtml(title)}</div>`;
  const wrap = document.createElement("div");
  if(!users.length){
    wrap.innerHTML = "<p style='padding:0 12px 12px;color:#777'>No users found</p>";
  }else{
    users.forEach(u => {
      const row = document.createElement("div");
      row.className = "user";
      const subText = u.username ? `@${u.username}` : "";
      const trustText = u.trust_score ? `Trust ${Math.round(u.trust_score)}` : "";
      row.innerHTML = `
        <img src="${escapeHtml(u.photo || "Images/user.png")}">
        <div class="info">
          <div class="name-row">
            <b>${escapeHtml(u.display_name || "Member")}</b>
            ${u.verified ? `<span class="verified-badge">Verified</span>` : ""}
          </div>
          <span>${escapeHtml([subText, trustText].filter(Boolean).join(" - "))}</span>
          <div class="profile-actions">
            <button class="action-btn message js-message">Message</button>
            <button class="action-btn js-view">View profile</button>
          </div>
        </div>
      `;
      row.onclick = () => location.href = `m-account.html?uid=${encodeURIComponent(u.user_id)}`;
      const msgBtn = row.querySelector(".js-message");
      const viewBtn = row.querySelector(".js-view");
      msgBtn.onclick = e => {
        e.stopPropagation();
        location.href = `chat.html?uid=${encodeURIComponent(u.user_id)}`;
      };
      viewBtn.onclick = e => {
        e.stopPropagation();
        location.href = `m-account.html?uid=${encodeURIComponent(u.user_id)}`;
      };
      wrap.appendChild(row);
    });
  }
  section.appendChild(wrap);
  return section;
}

async function searchUsers(){
  const query = searchInput.value.trim();
  list.innerHTML = "<p style='padding:12px;color:#777'>Loading...</p>";
  try{
    await ensureSession();
    const results = await Promise.allSettled([
      fetchUsers(query),
      fetchReels(query),
      fetchVideos(query),
      fetchPosts(query)
    ]);
    const users = results[0].status === "fulfilled" ? results[0].value : [];
    const reels = results[1].status === "fulfilled" ? results[1].value : [];
    const videos = results[2].status === "fulfilled" ? results[2].value : [];
    const posts = results[3].status === "fulfilled" ? results[3].value : [];
    list.innerHTML = "";
    list.appendChild(renderReelsSection(reels));
    list.appendChild(renderVideosSection(videos));
    list.appendChild(renderPostsSection(posts));
    list.appendChild(renderUserSection(users, "account", "SELLERS & BUYERS"));
    list.appendChild(renderUserSection(users, "profile", "PROFILE"));
    list.appendChild(renderUserSection(users, "users", "USERS"));
    setActiveTab(activeTab);
    trackAutomationStep("discovery", {
      query_length: query.length,
      user_results: users.length,
      reel_results: reels.length,
      video_results: videos.length,
      post_results: posts.length
    }).catch(()=>{});
  }catch(err){
    if(String(err?.message || "").toLowerCase() === "login_required"){
      return;
    }
    console.error("search_users_failed", err);
    list.innerHTML = "";
    list.appendChild(renderReelsSection([]));
    list.appendChild(renderVideosSection([]));
    list.appendChild(renderPostsSection([]));
    list.appendChild(renderUserSection([], "account", "SELLERS & BUYERS"));
    list.appendChild(renderUserSection([], "profile", "PROFILE"));
    list.appendChild(renderUserSection([], "users", "USERS"));
    setActiveTab(activeTab);
  }
}

searchInput.addEventListener("keydown", e => {
  if(e.key === "Enter") searchUsers();
});

tabs.addEventListener("click", e => {
  const btn = e.target.closest(".tab-btn");
  if(!btn) return;
  activeTab = btn.dataset.tab || "reels";
  setActiveTab(activeTab);
});

function setActiveTab(tabKey){
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.tab === tabKey);
  });
  document.querySelectorAll(".section").forEach(section => {
    section.style.display = section.dataset.section === tabKey ? "block" : "none";
  });
}

function go(p){ location.href = p; }

searchUsers();
